<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drevici Oyster — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#10285E;--gold:#C6A24A;--bg:#F4F0EA;--white:#fff;--border:rgba(0,0,0,0.08);--text:#1a1a1a;--text2:#666;--text3:#aaa;--r:10px;--rs:6px}
body{background:var(--bg);font-family:'Jost',sans-serif;font-weight:400;font-size:14px}

/* ── LIGHTBOX ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-card{position:relative;width:min(420px,92vw);border-radius:16px;overflow:hidden;background:#10285E}
.lb img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.28);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .15s;z-index:2}
.lb-nav:hover{background:rgba(0,0,0,0.5)}
.lb-prev{left:10px}.lb-next{right:10px}
.lb-footer{background:#10285E;padding:16px 20px 20px}
.lb-dish-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;font-weight:700;line-height:1.2;text-align:center;margin-bottom:5px}
.lb-dish-desc{font-size:14px;color:rgba(255,255,255,0.75);font-family:'Jost',sans-serif;font-weight:300;line-height:1.55;text-align:center;margin-bottom:10px}
.lb-footer-row{display:flex;align-items:center;justify-content:center}
.lb-count{font-size:11px;color:#10285E;letter-spacing:.12em;font-family:'Jost',sans-serif;background:rgba(255,255,255,0.9);padding:2px 10px;border-radius:20px}
.lb-close{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.35);border:none;color:#fff;font-size:16px;cursor:pointer;line-height:1;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:3;backdrop-filter:blur(4px)}

/* ── LAYOUT ── */
.page{background:var(--bg);min-height:100vh;padding-bottom:100px}
.container{max-width:680px;margin:0 auto;padding:0 16px}

/* ── HEADER ── */
.header{background:var(--navy);padding:14px 0 0}
.header .container{display:flex;flex-direction:column;align-items:center}
.header-top{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header-top-left{display:flex;align-items:center;gap:6px}
.header-top-right{display:flex;align-items:center;gap:6px}

.lang-wrap{position:relative}
.lang-sel{display:flex;align-items:center;gap:3px;padding:5px 10px;border:1px solid rgba(255,255,255,0.25);border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);font-size:11px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.06em;user-select:none}
.lang-dd{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:8px;overflow:hidden;z-index:400;display:none;min-width:140px;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.lang-dd.open{display:block}
.lang-opt{padding:9px 14px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Jost',sans-serif;white-space:nowrap;transition:background .1s}
.lang-opt:hover{background:var(--bg)}
.lang-opt.active{color:var(--navy);font-weight:500}
.admin-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid rgba(255,255,255,0.25);border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);transition:background .15s;flex:none}
.admin-btn:hover{background:rgba(255,255,255,0.2)}
.admin-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.admin-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.logo-img{height:32px;object-fit:contain;display:block;}
.header-top{position:relative}
.logo-centered{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
@media(min-width:480px){.logo-img{height:42px}}
.header-sub{font-size:10px;font-weight:300;color:rgba(255,255,255,0.45);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px;text-align:center}

/* ── STICKY NAV ── */
.sticky-nav{position:sticky;top:0;z-index:99}
.nav-bar{background:var(--navy);overflow-x:auto;scrollbar-width:none;display:flex;border-bottom:1px solid rgba(255,255,255,0.1)}
.nav-bar::-webkit-scrollbar{display:none}
.nav-bar-inner{display:flex;max-width:680px;margin:0 auto;padding:0 16px;min-width:max-content}
.nav-tab{flex:none;padding:11px 14px;font-size:11px;font-weight:500;font-family:'Jost',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.4);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.nav-tab.active{color:#fff;border-bottom-color:var(--gold)}
.view-bar{background:#fff;border-bottom:1px solid var(--border)}
.view-bar-inner{max-width:680px;margin:0 auto;padding:9px 16px;display:flex;align-items:center;justify-content:space-between}
.view-tab-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif}
.view-btns{display:flex;gap:4px}
.view-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:#fff;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .15s}
.view-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.view-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.view-btn.active svg{stroke:#fff}

/* ── CONTENT ── */
.tab-content{display:none;padding:18px 0}
.tab-content.active{display:block}
.cards-stack{display:flex;flex-direction:column;gap:12px}

/* ── INTRO CARD ── */
.intro-card{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:18px 20px}
.intro-card-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif;margin-bottom:8px}
.intro-card-text{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text);line-height:1.6}

/* ── FEATURED ── */
.featured-card{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:16px}
.featured-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif;margin-bottom:12px}
.featured-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.featured-item{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.featured-item-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#ece8e1}
.featured-item-body{padding:8px 10px 10px}
.featured-item-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--navy);line-height:1.2}
.featured-item-price{font-size:11px;font-weight:500;color:var(--gold);margin-top:3px}

/* ── CARD ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border)}
.card-hdr{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.card-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif}
.card-body{padding:14px 16px 16px}

/* ── DISH LIST ── */
.dish-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.dish-row-clickable{cursor:pointer;transition:background .15s;border-radius:6px;margin:0 -6px;padding-left:6px;padding-right:6px}
.dish-row-clickable:hover{background:rgba(16,40,94,0.03)}
.dish-row:first-child{padding-top:0}
.dish-row:last-child{border-bottom:none;padding-bottom:0}
.dish-text{flex:1;min-width:0}
.dish-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dish-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--navy);line-height:1.2}
.dish-badges{display:flex;gap:4px;align-items:center}
.badge-icon{width:18px;height:18px;object-fit:contain;display:inline-block}
.dish-desc{font-size:12px;font-weight:300;color:var(--text2);line-height:1.55;margin-top:2px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.dish-price{font-size:12px;font-weight:500;color:var(--gold);margin-top:6px}
.dish-img{width:80px;height:80px;border-radius:8px;object-fit:cover;flex:none;background:#ece8e1;cursor:pointer;transition:opacity .15s}
.dish-img:hover{opacity:.82}

/* ── GRID ── */
.dish-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.gc{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.gc-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#ece8e1;cursor:pointer;transition:opacity .15s}
.gc-img:hover{opacity:.82}
.gc-body{padding:10px 12px 12px}
.gc-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--navy);margin-bottom:2px;line-height:1.2}
.gc-desc{font-size:11px;font-weight:300;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gc-price{font-size:12px;font-weight:500;color:var(--gold);margin-top:5px}

/* ── VARIANTS / BEV ── */
.variant-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.variant-row:last-child{border-bottom:none;padding-bottom:0}
.variant-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:var(--text)}
.variant-price{font-size:12px;font-weight:500;color:var(--gold)}
.bev-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.bev-sizes{font-size:12px;font-weight:300;color:var(--text2);font-family:'Jost',sans-serif;margin-top:2px}
.bev-row:last-child{border-bottom:none;padding-bottom:0}
.bev-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text)}
.bev-price{font-size:12px;font-weight:500;color:var(--gold)}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid rgba(198,162,74,0.35);color:var(--gold);margin-left:6px;vertical-align:middle;font-family:'Jost',sans-serif;letter-spacing:.04em}

/* ── SPECIALS BANNER (menu du jour/midi/soir) ── */
.special-banner{background:var(--navy);border-radius:var(--r);padding:16px 18px;margin-bottom:4px}
.special-banner-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);font-family:'Jost',sans-serif;margin-bottom:4px}
.special-banner-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.special-banner-text{font-size:12px;font-weight:300;color:rgba(255,255,255,0.65);line-height:1.6}
.special-banner-price{font-size:15px;font-weight:500;color:var(--gold);margin-top:8px}

/* ── STICKY RESERVE ── */
.sticky-reserve{position:sticky;bottom:0;z-index:100;padding:10px 0 14px;background:linear-gradient(to top,var(--bg) 70%,transparent)}
.ig-text{display:block;text-align:center;font-size:10px;letter-spacing:.16em;color:var(--text3);text-decoration:none;font-family:'Jost',sans-serif;font-weight:400;margin-top:8px;transition:color .15s}
.ig-text:hover{color:var(--navy)}
.sticky-reserve .container{display:block}
.reserve-btn{display:block;width:100%;padding:15px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:'Jost',sans-serif;letter-spacing:.06em;cursor:pointer;text-align:center;text-decoration:none}

/* ── ADMIN ── */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:none}
.admin-overlay.open{display:block}
.admin-panel{position:fixed;top:0;right:0;bottom:0;width:min(440px,100vw);background:#fff;z-index:501;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.admin-panel.open{transform:translateX(0)}
.admin-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.admin-hdr-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--navy)}
.admin-hdr-right{display:flex;gap:6px;align-items:center}
.admin-tab-dd{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Jost',sans-serif;color:var(--text);background:#fff;cursor:pointer;outline:none;max-width:160px}
.admin-close{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:17px;color:var(--text2);line-height:1}
.admin-body{flex:1;overflow-y:auto;padding:16px}
.admin-section{margin-bottom:20px}
.admin-sect-title{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.af{margin-bottom:9px}
.al{font-size:11px;font-weight:500;color:var(--text2);font-family:'Jost',sans-serif;margin-bottom:3px;display:block;letter-spacing:.04em}
.ai{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:'Jost',sans-serif;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.ai:focus{border-color:var(--navy)}
.ai-row{display:flex;gap:6px}
.ai-sm{width:80px!important;flex:none!important}
.ai-check{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-family:'Jost',sans-serif;color:var(--text2)}
.ai-check input{cursor:pointer;accent-color:var(--navy)}
.admin-card{background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)}
.admin-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.admin-card-num{font-size:11px;color:var(--text3);font-family:'Jost',sans-serif}
.adel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;line-height:1;padding:2px 4px;border-radius:4px}
.adel:hover{color:#c0392b;background:#fef0ee}
.apin{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:4px;color:var(--text3)}
.apin.pinned{color:var(--gold)}
.apin:hover{background:rgba(198,162,74,0.1)}
.aadd{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:var(--rs);background:none;color:var(--text3);font-size:12px;font-family:'Jost',sans-serif;cursor:pointer;transition:all .15s;margin-top:4px}
.aadd:hover{border-color:var(--navy);color:var(--navy)}
.asave{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:50px;font-size:13px;font-weight:500;font-family:'Jost',sans-serif;cursor:pointer;margin-top:6px;letter-spacing:.04em}
.adanger{width:100%;padding:10px;background:none;color:#c0392b;border:1px solid #f5c6c2;border-radius:50px;font-size:12px;font-family:'Jost',sans-serif;cursor:pointer;margin-top:6px}
.admin-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.admin-toggle:hover{border-color:var(--navy)}
.admin-toggle input[type=checkbox]{accent-color:var(--navy);cursor:pointer}
.admin-toggle label{font-size:12px;font-family:'Jost',sans-serif;color:var(--text);cursor:pointer;flex:1}
.admin-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:20px;background:#e8f0fd;color:var(--navy);font-family:'Jost',sans-serif;margin-left:6px;vertical-align:middle;letter-spacing:.04em}
.badge-group{display:flex;gap:6px;margin-top:6px}
.badge-check{display:flex;align-items:center;gap:4px;font-size:11px;font-family:'Jost',sans-serif;color:var(--text2);cursor:pointer}
.badge-check img{width:16px;height:16px;object-fit:contain}
.badge-check input{accent-color:var(--navy);cursor:pointer}

/* ── CONFIRM MODAL ── */
.confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:600;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:#fff;border-radius:12px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}
.confirm-text{font-size:13px;color:var(--text2);font-family:'Jost',sans-serif;line-height:1.5;margin-bottom:20px}
.confirm-btns{display:flex;gap:8px}
.confirm-cancel{flex:1;padding:11px;border:1px solid var(--border);border-radius:50px;background:#fff;font-size:13px;font-family:'Jost',sans-serif;cursor:pointer;color:var(--text2)}
.confirm-ok{flex:1;padding:11px;border:none;border-radius:50px;background:#c0392b;color:#fff;font-size:13px;font-family:'Jost',sans-serif;cursor:pointer;font-weight:500}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:9px 18px;border-radius:50px;font-size:12px;font-family:'Jost',sans-serif;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.img-wrap{position:relative;display:inline-block;flex:none;cursor:pointer}
.img-wrap .zoom-ic{display:none}
.gc-wrap{position:relative;cursor:pointer;display:block}
.gc-wrap .zoom-ic{display:none}

.drag-handle{cursor:grab;padding:4px 6px 4px 2px;color:var(--text3);font-size:16px;line-height:1;user-select:none;flex:none}
.drag-handle:active{cursor:grabbing}
.admin-card.dragging{opacity:.4;border:2px dashed var(--navy)}
.admin-card.drag-over{border-top:3px solid var(--navy)}

/* ── EDIT MODE ── */
.edit-overlay{position:fixed;inset:0;z-index:200;background:rgba(16,40,94,0.0);pointer-events:none}
.edit-mode .dish-row-clickable,.edit-mode .dish-row,.edit-mode .bev-row,.edit-mode .gc{
  cursor:pointer!important;position:relative;transition:outline .15s
}
.edit-mode .dish-row:hover,.edit-mode .bev-row:hover,.edit-mode .gc:hover{
  outline:2px solid var(--gold);border-radius:6px
}
.edit-mode-bar{display:none;position:sticky;top:90px;z-index:98;background:#fff9e6;border-bottom:2px solid var(--gold);padding:7px 16px;text-align:center;font-size:11px;font-family:'Jost',sans-serif;letter-spacing:.08em;color:var(--gold);text-transform:uppercase}
.edit-mode .edit-mode-bar{display:block}

/* ── EDIT DRAWER ── */
.edit-drawer{position:fixed;inset:0;z-index:600;display:none;align-items:flex-end;background:rgba(0,0,0,0.5)}
.edit-drawer.open{display:flex}
.edit-drawer-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 20px 32px}
.edit-drawer-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.edit-drawer-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--navy)}
.edit-drawer-close{background:none;border:1px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.edit-save-btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:'Jost',sans-serif;cursor:pointer;margin-top:16px;letter-spacing:.04em}
.edit-save-btn:active{opacity:.85}
</style>
</head>
<body>

<div id="toast"></div>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <div class="lb-card">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <div style="position:relative">
      <button class="lb-nav lb-prev" onclick="lbStep(-1)">&#8249;</button>
      <img id="lbImg" src="" alt=""/>
      <button class="lb-nav lb-next" onclick="lbStep(1)">&#8250;</button>

let lang='fr', view='list', currentTabId='huitres', editMode=false;
let lbImages=[], lbIdx=0;
let confirmCallback=null;

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function t(obj){ if(!obj) return ''; if(typeof obj==='string') return obj; return obj[lang]||obj.fr||''; }

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',2200);
}

function askConfirm(msg,cb){
  document.getElementById('confirmText').textContent=msg;
  document.getElementById('confirmOk').onclick=()=>{closeConfirm();cb();};
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirmModal').classList.remove('open'); }

// ═══════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════
function collectLbImages(){
  lbImages=[];
  DATA.tabs.forEach(tab=>{
    tab.cards.forEach(card=>{
      if(card.dishes) card.dishes.forEach(d=>{ if(d.img) lbImages.push({src:d.img,name:t(d.name),desc:t(d.desc)||''}); });
      if(card.img && !card.dishes) lbImages.push({src:card.img,name:t(card.label),desc:''});
    });
  });
}
function openLb(idx){ collectLbImages(); lbIdx=idx; renderLbSlide(); document.getElementById('lb').classList.add('open'); document.body.style.overflow='hidden'; }
function closeLb(){ document.getElementById('lb').classList.remove('open'); document.body.style.overflow=''; }
function lbStep(d){ lbIdx=(lbIdx+d+lbImages.length)%lbImages.length; renderLbSlide(); }
function renderLbSlide(){
  const item=lbImages[lbIdx];
  document.getElementById('lbImg').src=item.src;
  document.getElementById('lbName').textContent=item.name;
  document.getElementById('lbDesc').textContent=item.desc||'';
  document.getElementById('lbCount').textContent=(lbIdx+1)+' / '+lbImages.length;
}
document.getElementById('lb').addEventListener('click',e=>{ if(!e.target.closest('.lb-card')) closeLb(); });
document.addEventListener('keydown',e=>{ const lb=document.getElementById('lb'); if(!lb.classList.contains('open'))return; if(e.key==='Escape')closeLb(); if(e.key==='ArrowLeft')lbStep(-1); if(e.key==='ArrowRight')lbStep(1); });

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderAll(){ collectLbImages(); renderNav(); renderTabs(); renderViewBar();  }

function renderNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  DATA.tabs.forEach(tab=>{
    const el=document.createElement('div');
    el.className='nav-tab'+(tab.id===currentTabId?' active':'');
    el.textContent=t(tab.label);
    el.addEventListener('click',()=>{ currentTabId=tab.id; renderAll(); });
    nav.appendChild(el);
  });
}

function renderViewBar(){
  const tab=DATA.tabs.find(tb=>tb.id===currentTabId);
  document.getElementById('viewLabel').textContent=tab?t(tab.label):'';
  document.getElementById('btnList').classList.toggle('active',view==='list');
  document.getElementById('btnGrid').classList.toggle('active',view==='grid');
}

function setView(v){ view=v; renderAll(); }

function renderTabs(){
  const container=document.getElementById('tabsContainer'); container.innerHTML='';
  collectLbImages();
  let lbCounter=0;
  DATA.tabs.forEach(tab=>{
    const section=document.createElement('div');
    section.className='tab-content'+(tab.id===currentTabId?' active':'');
    section.id='tab-'+tab.id;
    const inner=document.createElement('div');
    inner.className='container';
    // compute lbOffset
    let lbOffset=0;
    for(let i=0;i<DATA.tabs.length;i++){
      if(DATA.tabs[i].id===tab.id) break;
      DATA.tabs[i].cards.forEach(c=>{ if(c.dishes) c.dishes.forEach(d=>{ if(d.img) lbOffset++; }); if(c.img&&!c.dishes) lbOffset++; });
    }
    inner.innerHTML=renderTabContent(tab,lbOffset);
    section.appendChild(inner);
    container.appendChild(section);
    // attach lb handlers via delegation (works for img-wrap + gc-wrap)
    section.addEventListener('click', e => {
      const el = e.target.closest('[data-lbidx]');
      if(el) openLb(parseInt(el.dataset.lbidx));
    });
  });
}

function renderTabContent(tab,lbOffset){
  const tabIdxForEdit=DATA.tabs.findIndex(tb=>tb.id===tab.id);
  let imgIdx=lbOffset;
  let html='<div class="cards-stack">';

  // HOME: specials + intro + featured
  if(tab.isHome){
    // active specials
    DATA.specials.forEach(sp=>{
      if(sp.active){
        html+=`<div class="special-banner"><div class="special-banner-label">${t(sp.label)}</div><div class="special-banner-title">${t(sp.title)}</div><div class="special-banner-text">${t(sp.desc)}</div>${sp.price?`<div class="special-banner-price">${sp.price}</div>`:''}</div>`;
      }
    });
    // intro
    if(DATA.intro.active){
      html+=`<div class="intro-card"><div class="intro-card-label">Le restaurant</div><div class="intro-card-text">${t(DATA.intro.text)}</div></div>`;
    }
    // featured / pinned
    const pins=DATA.pinnedDishes||[];
    const pinDishes=pins.map(p=>{ const tb=DATA.tabs.find(tb=>tb.id===p.tabId); if(!tb)return null; const card=tb.cards[p.cardIdx]; if(!card||!card.dishes)return null; return card.dishes[p.dishIdx]; }).filter(Boolean);
    if(pinDishes.length>0){
      html+=`<div class="featured-card"><div class="featured-label">⭐ Nos incontournables</div><div class="featured-grid">`;
      pinDishes.slice(0,4).forEach(d=>{ html+=`<div class="featured-item">${d.img?`<img class="featured-item-img" src="${d.img}" alt="" loading="lazy">`:'<div class="featured-item-img"></div>'}<div class="featured-item-body"><div class="featured-item-name">${t(d.name)}</div><div class="featured-item-price">${d.price}</div></div></div>`; });
      html+=`</div></div>`;
    }
  }

  if(view==='grid' && !['boissons'].includes(tab.id)){
    // Collect all grid items across cards into one unified 2-col grid
    let gridItems=[];
    tab.cards.forEach(card=>{
      if(card.type==='bevs') return;
      if(card.type==='variants'){
        const idx=card.img?imgIdx++:null;
        const flavours=(card.variants||[]).map(v=>t(v.name)).join(' · ');
        const price=card.variants&&card.variants[0]?card.variants[0].price:'';
        gridItems.push(`<div class="gc"><div class="gc-wrap" ${card.img?`data-lbidx="${idx}"`:''}>${card.img?`<img class="gc-img" src="${card.img}" alt="" loading="lazy">`:'<div style="aspect-ratio:1;background:#ece8e1"></div>'}</div><div class="gc-body"><div class="gc-name">${t(card.label)}</div><div class="gc-desc">${flavours}</div><div class="gc-price">${price}</div></div></div>`);
        return;
      }
      (card.dishes||[]).forEach(d=>{
        const idx=d.img?imgIdx++:null;
        const badges=(d.spicy?`<img src="https://drevicioyster.com/wp-content/uploads/2026/06/icon-spicy.png" class="badge-icon" title="Épicé">`:'')+(d.vegan?`<img src="https://drevicioyster.com/wp-content/uploads/2026/06/icon-vegan.png" class="badge-icon" title="Vegan">`:'');
        gridItems.push(`<div class="gc"><div class="gc-wrap" ${d.img?`data-lbidx="${idx}"`:''}>${d.img?`<img class="gc-img" src="${d.img}" alt="" loading="lazy">`:'<div style="aspect-ratio:1;background:#ece8e1"></div>'}</div><div class="gc-body"><div class="gc-name">${t(d.name)}${badges?` <span class="dish-badges" style="display:inline-flex">${badges}</span>`:''}</div><div class="gc-desc">${t(d.desc)}</div><div class="gc-price">${d.price}</div></div></div>`);
      });
    });
    if(gridItems.length) html+=`<div class="dish-grid">${gridItems.join('')}</div>`;
  } else {
    // list
    tab.cards.forEach(card=>{
      html+=`<div class="card"><div class="card-hdr"><span class="card-label">${t(card.label)}</span></div><div class="card-body">`;

      if(card.type==='bevs'){
        (card.items||[]).forEach((item,bevItemIdx)=>{
          const cardIdxForEdit=tab.cards.indexOf(card);
          const itemIdxForEdit=bevItemIdx;
          const sizes=item.sizes||[];
          // sizes display: "25cl / 50cl" in name area, "5€ / 17€" in price area
          const clStr=sizes.length>0?sizes.filter(s=>s.cl).map(s=>s.cl+'cl').join(' / '):'';
          const priceStr=sizes.length>0?sizes.filter(s=>s.price).map(s=>s.price+'€').join(' / '):(item.price||'');
          html+=`<div class="bev-row" onclick="editMode?openEditBev(${tabIdxForEdit},${cardIdxForEdit},${itemIdxForEdit}):null" style="${editMode?'cursor:pointer':''}"><div><span class="bev-name">${t(item.name)}</span>${clStr?`<div class="bev-sizes">${clStr}</div>`:''}</div><span class="bev-price">${priceStr}</span></div>`;
        });
      } else if(card.type==='variants'){
        // Render as dish row: name in navy + all flavours as description
        const flavours=(card.variants||[]).map(v=>t(v.name)).join(' · ');
        const price=card.variants&&card.variants[0]?card.variants[0].price:'';
        const idx=card.img?imgIdx++:null;
        html+=`<div class="dish-row${card.img?' dish-row-clickable':''}" style="padding-top:0"${card.img?` data-lbidx="${idx}"`:''}>
          <div class="dish-text">
            <div class="dish-name-row"><span class="dish-name">${t(card.label)}</span></div>
            <div class="dish-desc">${flavours}</div>
            <div class="dish-price">${price}</div>
          </div>
          ${card.img?`<span class="img-wrap"><img class="dish-img" src="${card.img}" alt="" loading="lazy"></span>`:''}</div>`;
      } else {
        const cardIdx=tab.cards.indexOf(card);
        (card.dishes||[]).forEach((d,di)=>{
          const idx=d.img?imgIdx++:null;
          const badges=(d.spicy?`<img src="https://drevicioyster.com/wp-content/uploads/2026/06/icon-spicy.png" class="badge-icon" title="Épicé">`:'')+(d.vegan?`<img src="https://drevicioyster.com/wp-content/uploads/2026/06/icon-vegan.png" class="badge-icon" title="Vegan">`:'');
          html+=`<div class="dish-row${d.img?' dish-row-clickable':''}"${d.img&&!editMode?` data-lbidx="${idx}"`:''}${di===0?' style="padding-top:0"':''} onclick="editMode?openEditDish(${tabIdxForEdit},${cardIdx},${di}):null"><div class="dish-text"><div class="dish-name-row"><span class="dish-name">${t(d.name)}</span>${badges?`<span class="dish-badges">${badges}</span>`:''}</div><div class="dish-desc">${t(d.desc)}</div><div class="dish-price">${d.price}</div></div>${d.img?`<span class="img-wrap"><img class="dish-img" src="${d.img}" alt="" loading="lazy"></span>`:''}</div>`;
        });
      }
      html+=`</div></div>`;
    });
  }

  html+='</div>';
  return html;
}

function openEditBev(ti,ci,ii){
  if(!editMode) return;

  editDraft=JSON.parse(JSON.stringify(item));
  const nm=typeof editDraft.name==='object'?editDraft.name:({fr:editDraft.name});
  document.getElementById('editDrawerTitle').textContent=nm.fr||'Modifier la boisson';
  const isFr=adminLang==='fr';
  const sizes=editDraft.sizes||[];

    <div id="ed-sizes">${sizeRows}</div>
    <button class="aadd" onclick="if(!editDraft.sizes)editDraft.sizes=[];editDraft.sizes.push({cl:'',price:''});openEditBev(${ti},${ci},${ii})">+ Taille</button>`;
  document.getElementById('editDrawer').classList.add('open');
}

function saveEditDrawer(){
  if(!editContext) return;
  const {type,ti,ci,di,ii}=editContext;
  if(type==='dish'){
    const d=DATA.tabs[ti].cards[ci].dishes[di];
    if(!d.name||typeof d.name!=='object') d.name={fr:''};
    if(!d.desc||typeof d.desc!=='object') d.desc={fr:''};
    d.name[adminLang]=document.getElementById('ed-name').value;
    d.desc[adminLang]=document.getElementById('ed-desc').value;
    const pv=document.getElementById('ed-price').value;
    d.price=pv?pv+'€':'';
    d.img=document.getElementById('ed-img').value;
    d.spicy=document.getElementById('ed-spicy').checked;
    d.vegan=document.getElementById('ed-vegan').checked;
  } else if(type==='bev'){
    const item=DATA.tabs[ti].cards[ci].items[ii];
    if(typeof item.name!=='object') item.name={fr:item.name||''};
    item.name[adminLang]=document.getElementById('ed-bev-name').value;
    item.sizes=editDraft.sizes||[];
  }
  renderAll();
  closeEditDrawer();
  showToast('✅ Enregistré — Publie pour mettre en ligne');
}

function closeEditDrawer(){
  document.getElementById('editDrawer').classList.remove('open');
  editContext=null; editDraft={};
}
document.getElementById('editDrawer').addEventListener('click',e=>{
  if(e.target===e.currentTarget) closeEditDrawer();
});

function updateLangIcon(){
  const enabledLangs=Object.entries(DATA.langs||{}).filter(([k,v])=>v.enabled&&k!=='fr').map(([k])=>k);
  const wrap=document.getElementById('langIconWrap');
  const placeholder=document.getElementById('langIconPlaceholder');
  if(enabledLangs.length>0){
    wrap.style.display=''; placeholder.style.display='none';
    // rebuild dropdown to show only enabled langs
    const dd=document.getElementById('langDD');
    dd.innerHTML=`<div class="lang-opt active" data-lang="fr" onclick="setLang('fr')">FR — Français</div>`
      +enabledLangs.map(l=>`<div class="lang-opt" data-lang="${l}" onclick="setLang('${l}')">${l.toUpperCase()} — ${(DATA.langs[l]||{}).label||l}</div>`).join('');
    // if current lang not enabled, reset to fr
    if(lang!=='fr'&&!enabledLangs.includes(lang)) setLang('fr');

function adminGoTab(val){
  if(val==='__addtab'){ addNewTab(); return; }
  adminCurrentTab=val;
  renderAdminSection(val);
}

function renderAdminSection(tid){
  const body=document.getElementById('adminBody');
  if(tid==='__global'){
    body.innerHTML=renderAdminGlobal();
  } else {
    const ti=DATA.tabs.findIndex(tb=>tb.id===tid);
    if(ti<0){body.innerHTML='';return;}
    body.innerHTML=renderAdminTab(ti);
  }
  // bind inputs
  body.querySelectorAll('.ai[data-bind]').forEach(input=>input.addEventListener('input',()=>applyBind(input)));
  body.querySelectorAll('.ai[data-bind]').forEach(input=>input.addEventListener('change',()=>applyBind(input)));
}

function applyBind(input){
  const path=input.dataset.bind.split('.');
  let obj=DATA;
  for(let i=0;i<path.length-1;i++) obj=obj[path[i]];
  const key=path[path.length-1];
  if(input.type==='checkbox') obj[key]=input.checked; else obj[key]=input.value;
  renderAll();
}

function deepSet(obj,path,val){
  const parts=path.split('.');
  for(let i=0;i<parts.length-1;i++) obj=obj[parts[i]];
  obj[parts[parts.length-1]]=val;
}

function setAdminLang(l){
  adminLang=l;
  document.getElementById('adminLangDd').value=l;
  renderAdminSection(adminCurrentTab);
}

  const isFr = adminLang==='fr';

}

function addCard(ti){
  const tab=DATA.tabs[ti];

// DRAG AND DROP
// ═══════════════════════════════════════════
let dragSrc=null;
function onDragBev(e,ti,ci,ii){ dragSrc={ti,ci,ii,isBev:true}; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onDropBev(e,ti,ci,ii){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!dragSrc||!dragSrc.isBev||dragSrc.ti!==ti||dragSrc.ci!==ci||dragSrc.ii===ii) return;
  const items=DATA.tabs[ti].cards[ci].items;
  const [moved]=items.splice(dragSrc.ii,1); items.splice(ii,0,moved);
  dragSrc=null; renderAll(); renderAdminSection(DATA.tabs[ti].id);
}
function onDragStart(e,ti,ci,di){ dragSrc={ti,ci,di}; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onDragEnd(e){ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.admin-card').forEach(el=>el.classList.remove('drag-over')); }
function onDragOver(e,ti,ci,di){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function onDrop(e,ti,ci,di){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!dragSrc||dragSrc.ti!==ti||dragSrc.ci!==ci||dragSrc.di===di) return;
  const dishes=DATA.tabs[ti].cards[ci].dishes;
  const [moved]=dishes.splice(dragSrc.di,1);
  dishes.splice(di,0,moved);
  dragSrc=null;
  renderAll(); renderAdminSection(DATA.tabs[ti].id);
}

// ═══════════════════════════════════════════
// GITHUB SYNC
// ═══════════════════════════════════════════
const GH_USER   = 'sowonboxx-cmd';
const GH_REPO   = 'drevici-menu';
const GH_FILE   = 'menu.json';
const GH_BRANCH = 'main';

function getToken(){ return localStorage.getItem('drevici_gh_token')||''; }
function saveToken(v){ if(v) localStorage.setItem('drevici_gh_token',v); else localStorage.removeItem('drevici_gh_token'); }
function getSha(){ return localStorage.getItem('drevici_gh_sha')||null; }
function saveSha(s){ if(s) localStorage.setItem('drevici_gh_sha',s); }

// ── Load from GitHub API (not CDN — always fresh, no 5min cache) ──
async function loadFromGitHub(){
  const token=getToken();
  if(!token){ console.log('No token — mode local'); return; }
  try{
    const apiBase=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
    const headers={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};
    const r=await fetch(apiBase+'?ref='+GH_BRANCH,{headers});
    if(!r.ok){
      if(r.status===404){ console.log('menu.json absent — premier lancement'); return; }
      throw new Error('HTTP '+r.status);
    }
    const meta=await r.json();
    // Save SHA for next publish (avoids a redundant GET)
    if(meta.sha) saveSha(meta.sha);
    // Decode base64 content → JSON
    const raw=atob(meta.content.replace(/\n/g,''));
    const bytes=Uint8Array.from(raw,ch=>ch.charCodeAt(0));
    const jsonStr=new TextDecoder().decode(bytes);
    const json=JSON.parse(jsonStr);
    // Apply everything
    if(Array.isArray(json.tabs) && json.tabs.length>0){
      DATA.tabs=json.tabs;
      DATA.tabs[0].isHome=true;
    }
    if(json.hero && typeof json.hero==='object') DATA.hero=json.hero;
    if(json.intro && typeof json.intro==='object') DATA.intro=json.intro;
    if(Array.isArray(json.specials) && json.specials.length>0) DATA.specials=json.specials;
    if(Array.isArray(json.pinnedDishes)) DATA.pinnedDishes=json.pinnedDishes;
    currentTabId=DATA.tabs[0]?.id||'huitres';
    console.log('✓ Chargé depuis GitHub API — tabs:'+DATA.tabs.length+', specials actifs:'+DATA.specials.filter(s=>s.active).length+', intro:'+DATA.intro.active);
  }catch(e){ console.warn('GitHub load failed:', e.message); }
}

// ── Publish to GitHub (always gets fresh SHA, stores it for next time) ──
async function publishToGitHub(){
  const token=getToken();
  if(!token){ showToast('⚠️ Token GitHub manquant'); renderAdminSection('__global'); return; }
  const btn=document.getElementById('ghPublishBtn');
  if(btn){ btn.textContent='⏳ Publication…'; btn.disabled=true; }
  try{
    const apiBase=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
    const headers={'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};

    // Always get a fresh SHA from the API (never use stale cache)
    let sha=null;
    const getR=await fetch(apiBase+'?ref='+GH_BRANCH+'&t='+Date.now(),{headers,cache:'no-store'});
    if(getR.ok){ const meta=await getR.json(); sha=meta.sha||null; saveSha(sha); }
    else if(getR.status!==404){ throw new Error('Erreur SHA: HTTP '+getR.status); }

    // Deep-clone DATA, serialize to JSON, encode to base64 (Unicode-safe)
    const clean=JSON.parse(JSON.stringify(DATA));
    const jsonStr=JSON.stringify(clean,null,2);
    const bytes=new TextEncoder().encode(jsonStr);
    let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
    const content=btoa(bin);

    const body={message:'Menu update — '+new Date().toLocaleString('fr-FR'),content,branch:GH_BRANCH};
    if(sha) body.sha=sha;

    const putR=await fetch(apiBase,{method:'PUT',headers,body:JSON.stringify(body),cache:'no-store'});
    if(!putR.ok){
      const err=await putR.json();
      // SHA conflict → retry with fresh SHA
      if(putR.status===409||putR.status===422){
        showToast('⏳ Conflit SHA, nouvelle tentative…');
        setTimeout(publishToGitHub,1000);
        return;
      }
      throw new Error(err.message||'HTTP '+putR.status);
    }
    const putData=await putR.json();
    // Store the new SHA immediately so next publish doesn't need a GET
    if(putData?.content?.sha) saveSha(putData.content.sha);
    showToast('✅ Publié ! En ligne dans ~30s');
  }catch(e){
    console.error('Publish error:',e);
    showToast('❌ '+e.message);
    if(e.message.includes('401')||e.message.toLowerCase().includes('credential')){ saveToken(''); renderAdminSection('__global'); }
  }finally{
    if(btn){ btn.textContent='🚀 Publier sur GitHub'; btn.disabled=false; }
  }
}

  return `<div class="admin-section">

          <button onclick="saveToken('');renderAdminSection('__global')" style="font-size:11px;color:#c0392b;background:none;border:1px solid #f5c6c2;border-radius:6px;padding:4px 8px;cursor:pointer;font-family:Jost,sans-serif">Réinitialiser</button>

      :`<div class="af"><label class="al">Token GitHub (ghp_…)</label>

            <button onclick="const v=document.getElementById('ghTokenInput').value.trim();if(v){saveToken(v);showToast('Token enregistré ✓');renderAdminSection('__global');}else{showToast('Token vide');}" style="padding:7px 12px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:Jost,sans-serif;font-size:12px;cursor:pointer;white-space:nowrap">OK</button>

        </div>`
    }
    <button class="asave" id="ghPublishBtn" onclick="publishToGitHub()" ${!token?'disabled style="opacity:.5;cursor:not-allowed"':''}style="margin-top:4px">🚀 Publier sur GitHub</button>
    <div style="font-size:11px;color:var(--text3);font-family:Jost,sans-serif;margin-top:8px;line-height:1.6">Ton menu sera en ligne sur<br><a href="https://${GH_USER}.github.io/${GH_REPO}/" target="_blank" style="color:var(--navy);font-weight:500">${GH_USER}.github.io/${GH_REPO}/</a><br>en ~30 secondes après chaque publication.</div>
  </div>`;
}
