<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans+Condensed:wght@300;700&family=Lovelo:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" id="themeColorMeta" content="#10285E">
<title>Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--restoFont:'Cormorant Garamond';--navy:#7A1F2B;--gold:#B8935A;--bg:#FFFFFF;--white:#fff;--border:rgba(0,0,0,0.08);--text:#1a1a1a;--text2:#666;--text3:#aaa;--r:10px;--rs:6px;--subtitleColor:rgba(255,255,255,0.45);--tabInactiveColor:rgba(255,255,255,0.4)}
body{background:var(--bg);font-family:'Jost',sans-serif;font-weight:400;font-size:14px}

/* ── LIGHTBOX ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-card{position:relative;width:min(420px,92vw);border-radius:16px;overflow:hidden;background:var(--navy);margin-top:44px}
.lb-zone{position:absolute;top:0;bottom:0;width:45%;z-index:3;cursor:pointer}
.lb-zone-left{left:0}
.lb-zone-right{right:0}
.lb img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;width:44px;height:44px;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;text-shadow:0 1px 6px rgba(0,0,0,0.6);transition:opacity .15s;z-index:2}
.lb-nav:hover{opacity:.75}
.lb-prev{left:10px}.lb-next{right:10px}
.lb-footer{background:var(--navy);padding:14px 20px 20px}
.lb-cat-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.lb-cat-line{flex:1;height:1px;background:var(--gold);opacity:.6;max-width:40px}
.lb-cat-label{font-family:'Open Sans',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.45)}
.lb-dish-name{font-family:'Open Sans',sans-serif;font-size:16px;color:#fff;font-weight:600;line-height:1.2;text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.lb-dish-desc{font-size:13px;color:rgba(255,255,255,0.65);font-family:'Open Sans',sans-serif;font-weight:400;line-height:1.55;text-align:center;margin-bottom:10px}
.lb-footer-row{display:flex;align-items:center;justify-content:center}
.lb-count{font-size:11px;color:#fff;letter-spacing:.12em;font-family:'Open Sans',sans-serif;background:none;padding:2px 0}
.lb-close{position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:3;opacity:.8;transition:opacity .15s}
.lb-close:hover{opacity:1}

/* ── LAYOUT ── */
.page{background:var(--bg);min-height:100vh;padding-bottom:100px}
.container{max-width:680px;margin:0 auto;padding:0 16px}

/* ── HEADER ── */
.header{background:var(--navy);padding:14px 0 0}
.header .container{display:flex;flex-direction:column;align-items:center}
.header-top{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header-top-left{display:flex;align-items:center;gap:6px}
.header-top-right{display:flex;align-items:center;gap:6px}

.lang-wrap{position:relative}
.lang-sel{display:flex;align-items:center;gap:3px;padding:5px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;cursor:pointer;background:var(--navy);color:rgba(255,255,255,0.85);font-size:11px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.06em;user-select:none}
.lang-dd{position:absolute;left:0;top:calc(100% + 6px);background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:8px;overflow:hidden;z-index:400;display:none;min-width:140px;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.lang-dd.open{display:block}
.lang-opt{padding:9px 14px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Jost',sans-serif;white-space:nowrap;transition:background .1s}
.lang-opt:hover{background:var(--bg)}
.lang-opt.active{color:var(--navy);font-weight:500}
.admin-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;cursor:pointer;background:var(--navy);color:rgba(255,255,255,0.75);transition:background .15s;flex:none}
.admin-btn:hover{background:rgba(255,255,255,0.08)}
.mode-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;cursor:pointer;background:var(--navy);transition:all .15s;flex:none;opacity:.5}
.mode-btn svg{width:15px;height:15px}
.mode-read{color:#4ade80}
.mode-edit{color:#f87171}
.mode-btn.active{opacity:1;border-color:currentColor;background:rgba(255,255,255,0.08)}
/* edit popup */
.edit-pop{position:fixed;inset:0;z-index:1200;display:none;align-items:center;justify-content:center;background:rgba(16,40,94,0.55);padding:16px}
.edit-pop.open{display:flex}
.edit-pop-box{background:#fff;border-radius:14px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.edit-pop-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0;z-index:2}
.edit-pop-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy)}
.edit-pop-close{width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.edit-pop-body{padding:18px 20px}
.edit-pop-foot{padding:14px 20px 18px;position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);border-radius:0 0 14px 14px}
.edit-save{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;letter-spacing:.03em;cursor:pointer}
.edit-save:active{transform:scale(0.99)}
.ef{margin-bottom:14px}
.el{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);font-family:'Jost',sans-serif;margin-bottom:5px}
.ei{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;font-size:14px;color:var(--text);background:#fff}
.ei:focus{outline:none;border-color:var(--navy)}
textarea.ei{resize:vertical;min-height:70px;line-height:1.5}
.ei-check{display:flex;align-items:center;gap:9px;cursor:pointer;padding:4px 0}
.ei-check input{width:17px;height:17px;accent-color:var(--navy);flex:none}
.ei-check span{font-size:13px;font-family:'Jost',sans-serif;color:var(--text)}
.ei-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge-toggle{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-family:'Jost',sans-serif;font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.badge-toggle .bt-emoji{font-size:15px;line-height:1}
.badge-toggle.on{border-color:var(--navy);background:rgba(16,40,94,0.07);color:var(--navy);font-weight:500}
.badge-toggle:active{transform:scale(0.97)}
.ef-acc{border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;background:#fbfbfa}
.ef-acc>summary{list-style:none;cursor:pointer;padding:12px 14px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;justify-content:space-between;user-select:none}
.ef-acc>summary::-webkit-details-marker{display:none}
.ef-acc>summary::after{content:'▾';font-size:14px;line-height:1;color:currentColor;transition:transform .2s;margin-left:8px;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px}
.ef-acc[open]>summary::after{transform:rotate(180deg)}
.ef-acc .acc-body{padding:2px 14px 12px}
.ef-acc .acc-body .ef:first-child{margin-top:0}
.badge-emoji{font-size:15px;line-height:1;display:inline-block;vertical-align:middle;margin-right:2px}
.efrow{display:flex;gap:10px}
.efrow>.ef{flex:1}
/* edit-mode clickable blocks */
.edit-mode [data-edit],.edit-mode .edit-block{cursor:pointer;position:relative;transition:box-shadow .12s}
.edit-mode [data-edit]:hover,.edit-mode .edit-block:hover{box-shadow:0 0 0 2px var(--navy);border-radius:8px}
.edit-mode .dish-row[data-edit]:hover,.edit-mode .bev-row[data-edit]:hover{box-shadow:inset 0 0 0 2px var(--navy);border-radius:8px}
.admin-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.admin-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.logo-img{height:32px;max-width:160px;object-fit:contain;display:none;}
.logo-text{font-family:var(--restoFont,'Cormorant Garamond'),serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.08em;white-space:nowrap;text-align:center}
.header-top{position:relative}
.logo-centered{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;align-items:center;justify-content:center}
@media(min-width:480px){.logo-img{height:42px;max-width:200px;display:block}.logo-text{display:none}}
.header-sub{font-size:10px;font-weight:300;color:var(--subtitleColor,rgba(255,255,255,0.45));letter-spacing:.14em;text-transform:uppercase;margin-bottom:0;text-align:center}

/* ── STICKY NAV ── */
.sticky-nav{position:sticky;top:0;z-index:99}
.nav-bar{background:var(--navy);overflow-x:auto;scrollbar-width:none;display:flex;border-bottom:none;margin-bottom:0;-webkit-overflow-scrolling:touch}
.nav-bar::-webkit-scrollbar{display:none}
.nav-bar-inner{display:flex;margin:0 auto;padding:0 16px 0 16px;min-width:max-content}
.nav-tab{flex:none;padding:11px 14px 10px;font-size:11px;font-weight:500;font-family:'Jost',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--tabInactiveColor,rgba(255,255,255,0.4));cursor:pointer;border-bottom:4px solid transparent;white-space:nowrap;transition:all .2s}
.nav-tab.active{color:#fff;border-bottom-color:var(--gold)}
.view-bar{background:#fff;border-bottom:1px solid var(--border)}
.view-bar-inner{max-width:680px;margin:0 auto;padding:9px 16px;display:flex;align-items:center;justify-content:space-between}
.view-tab-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif}
.view-btns{display:flex;gap:4px}
.view-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:#fff;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .15s}
.view-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.view-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.view-btn.active svg{stroke:#fff}

/* ── CONTENT ── */
.tab-content{display:none;padding:18px 0}
.tab-content.active{display:block}
.dish-grid,.cards-stack{animation:fadeIn 0.25s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cards-stack{display:flex;flex-direction:column;gap:12px}

/* ── INTRO CARD ── */
.intro-card{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:18px 20px}
.intro-card-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif;margin-bottom:8px}
.intro-card-text{font-family:'Open Sans',sans-serif;font-size:12px;color:var(--text);line-height:1.7}
.social-icons{display:flex;gap:14px;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,0,0,0.06)}
.social-links-bar{display:flex;gap:0;align-items:center;justify-content:center;padding:6px 0 2px;flex-wrap:wrap}
.social-link-txt{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--text3);text-decoration:none;text-transform:uppercase;font-family:Jost,sans-serif;transition:color .15s}
.social-link-txt:hover{color:var(--navy)}
.social-link-sep{font-size:10px;color:var(--text3);padding:0 8px}
.social-icon{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);color:var(--text3);text-decoration:none;transition:all .15s;font-size:13px}
.mode-links-bar{display:none;align-items:center;justify-content:center;gap:2px;margin-top:8px;padding:8px 4px;background:var(--navy);border-radius:10px}
.mode-link{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:5px 10px;font-family:Jost,sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.55;transition:opacity .15s}
.mode-link svg{width:14px;height:14px;flex:none}
.mode-link.active{opacity:1}
.mode-link-read{color:#4ade80}
.mode-link-edit{color:#f87171}
.mode-link-settings{color:rgba(255,255,255,0.92)}
.mode-link-sep{color:rgba(255,255,255,0.22);font-size:12px}
.social-icon:hover{border-color:var(--navy);color:var(--navy)}
.social-icon svg{width:14px;height:14px;fill:currentColor}

/* ── FEATURED ── */
.featured-card{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:16px}
.featured-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif;margin-bottom:12px}
.featured-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.featured-item{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.featured-item-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#ece8e1}
.featured-item-body{padding:8px 10px 10px}
.featured-item-name{font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;color:var(--navy);line-height:1.2}
.featured-item-price{font-size:11px;font-weight:500;color:var(--gold);margin-top:3px}

/* ── CARD ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border)}
.card-hdr{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.card-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif}
.card-body{padding:14px 16px 16px}

/* ── DISH LIST ── */
.dish-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.dish-row-clickable{cursor:pointer;transition:background .15s;border-radius:6px;margin:0 -6px;padding-left:6px;padding-right:6px}
.dish-row-clickable:hover{background:rgba(16,40,94,0.03)}
.dish-row:first-child{padding-top:0}
.dish-row:last-child{border-bottom:none;padding-bottom:0}
.dish-text{flex:1;min-width:0}
.dish-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dish-name{font-family:'Open Sans',sans-serif;font-size:14px;font-weight:600;color:var(--navy);line-height:1.2}
.dish-badges{display:flex;gap:4px;align-items:center}
.badge-icon{width:18px;height:18px;object-fit:contain;display:inline-block}
.dish-desc{font-size:12px;font-family:'Open Sans',sans-serif;font-weight:300;color:var(--text2);line-height:1.55;margin-top:2px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.dish-price{font-size:13px;font-weight:500;color:var(--gold);margin-top:6px}
.dish-img{width:80px;height:80px;border-radius:8px;object-fit:cover;flex:none;background:#ece8e1;cursor:pointer;transition:opacity .15s}
.dish-img:hover{opacity:.82}

/* ── GRID ── */
.dish-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.gc{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.gc-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#ece8e1;cursor:pointer;transition:opacity .15s}
.gc-img:hover{opacity:.82}
.gc-body{padding:10px 12px 12px}
.gc-name{font-family:'Open Sans',sans-serif;font-size:14px;font-weight:600;color:var(--navy);margin-bottom:2px;line-height:1.2}
.gc-desc{font-size:12px;font-family:'Open Sans',sans-serif;font-weight:300;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gc-price{font-size:12px;font-weight:500;color:var(--gold);margin-top:5px}
@media(max-width:640px){.gc-name{font-size:12px!important;font-family:'Open Sans',sans-serif!important}.gc-desc{font-size:11px!important;font-family:'Open Sans',sans-serif!important}}

/* ── VARIANTS / BEV ── */
.variant-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.variant-row:last-child{border-bottom:none;padding-bottom:0}
.variant-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:var(--text)}
.variant-price{font-size:12px;font-weight:500;color:var(--gold)}
.bev-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.bev-sizes{font-size:12px;font-weight:300;color:var(--text2);font-family:'Jost',sans-serif;margin-top:2px}
.bev-row:last-child{border-bottom:none;padding-bottom:0}
.bev-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text)}
.bev-price{font-size:12px;font-weight:500;color:var(--gold)}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid rgba(198,162,74,0.35);color:var(--gold);margin-left:6px;vertical-align:middle;font-family:'Jost',sans-serif;letter-spacing:.04em}

/* ── SPECIALS BANNER (menu du jour/midi/soir) ── */
.special-banner{background:var(--navy);border-radius:var(--r);padding:16px 18px}
.special-banner-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);font-family:'Jost',sans-serif;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.special-banner-title{font-family:'Open Sans',sans-serif;font-size:14px;font-weight:600;color:#fff;margin-bottom:6px}
.special-banner-text{font-size:12px;font-weight:400;font-family:'Open Sans',sans-serif;color:rgba(255,255,255,0.7);line-height:1.6}
.special-banner-price{font-size:15px;font-weight:500;color:var(--gold);margin-top:8px}

/* ── SOCIAL TEMPLATES ── */
.soc-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.soc-pos-btn{padding:6px 4px;font-size:10px;font-family:'Jost',sans-serif;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--text2);cursor:pointer;font-weight:500;min-width:40px}
.soc-pos-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.soc-layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.soc-left{flex:1;min-width:260px;display:flex;flex-direction:column;gap:0}
.soc-mini-section{margin-bottom:14px;padding:12px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.soc-mini-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.soc-preview-wrap{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}
.soc-canvas-wrap{flex:1;min-width:260px}
.soc-canvas-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-family:Jost,sans-serif}
.soc-frame{width:100%;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);position:relative}
.soc-frame.ratio-1{aspect-ratio:1}
.soc-frame.ratio-916{aspect-ratio:9/16}
.soc-frame.ratio-34{aspect-ratio:3/4}
.soc-controls{flex:1;min-width:220px}
.soc-caption-box{background:#f7f7f5;border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-top:12px;position:relative}
.soc-caption-text{font-size:12px;line-height:1.7;color:var(--text);font-family:Jost,sans-serif;white-space:pre-wrap}
.soc-copy-btn{position:absolute;top:10px;right:10px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:10px;padding:4px 10px;cursor:pointer;font-family:Jost,sans-serif}
.soc-dl-row{display:flex;gap:8px;margin-top:10px}
.soc-dl-btn{flex:1;padding:11px;border:none;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:Jost,sans-serif;letter-spacing:.04em}
.soc-dl-btn.post{background:var(--navy);color:#fff}
.soc-dl-btn.story{background:var(--gold);color:#fff}

/* Template internals */
.st-wrap{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.st-bg-navy{background:var(--navy)}
.st-bg-red{background:#B31217}
.st-bg-dark{background:#0a1a2e}
.st-bg-cream{background:#F7F4EF}
.st-logo{max-height:36px;width:auto;object-fit:contain;display:block}
.st-logo-sm{max-height:24px;width:auto;object-fit:contain;display:block;opacity:.7}
.st-title{font-family:"Cormorant Garamond",serif;font-weight:700;color:#fff;line-height:1.1}
.st-sub{font-family:"Open Sans",sans-serif;color:rgba(255,255,255,.75);line-height:1.5}
.st-gold{color:var(--gold)}
.st-badge{display:inline-block;background:var(--gold);color:#fff;font-family:"Open Sans",sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.st-divider{width:40px;height:2px;background:var(--gold)}
.st-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,26,46,.95) 0%,rgba(10,26,46,.4) 60%,transparent 100%)}
.st-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.st-content{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
.st-hashtags{font-family:"Open Sans",sans-serif;color:rgba(255,255,255,.45);font-size:.65em;letter-spacing:.06em}

/* ── HOME TAB ── */
.home-photo{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:var(--r);display:block}
.home-photo-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.home-schedule-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border-radius:var(--r);border:1px solid var(--border)}
.home-schedule-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-family:'Jost',sans-serif}

/* ── SCHEDULE WIDGET (from shared code) ── */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.resto-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.resto-dot.open{background:#22c55e;animation:pulse 2s ease-in-out infinite}
.resto-dot.closed{background:#ef4444}
.resto-dot.soon{background:#f97316;animation:pulse 2s ease-in-out infinite}
.resto-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--navy);cursor:pointer;position:relative;user-select:none}
.resto-popup{visibility:hidden;opacity:0;pointer-events:none;position:fixed;bottom:auto;left:auto;transform:none;transition:opacity .18s ease,transform .18s ease;background:rgba(15,25,50,.96);border:.5px solid rgba(255,255,255,.2);border-radius:12px;padding:14px 18px;min-width:210px;max-width:260px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.resto-popup.visible{visibility:visible;opacity:1;pointer-events:auto}
.resto-popup-arrow{display:none}
.resto-popup-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;color:#fff}
.resto-popup-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:rgba(255,255,255,.75);border-bottom:.5px solid rgba(255,255,255,.07)}
.resto-popup-row:last-child{border-bottom:none}
.resto-popup-row.today{color:#fff;font-weight:600}
.resto-popup-row .rday{color:rgba(255,255,255,.5);font-size:12px}
.resto-popup-row.today .rday{color:rgba(255,255,255,.85)}

/* ── STICKY RESERVE ── */
.sticky-reserve{position:sticky;bottom:0;z-index:100;padding:10px 0 14px;background:linear-gradient(to top,var(--bg) 70%,transparent)}
.sticky-reserve .container{display:block}
.reserve-btn{display:block;width:100%;padding:15px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;font-family:'Jost',sans-serif;letter-spacing:.06em;cursor:pointer;text-align:center;text-decoration:none}
@media(max-width:640px){
  .sticky-reserve{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:10px 0 env(safe-area-inset-bottom,14px);background:linear-gradient(to top,var(--bg) 80%,transparent)}
  .sticky-reserve .container{padding:0 0}
  .reserve-btn{border-radius:0;padding:17px 16px}
  .page{padding-bottom:130px}
  .header-top-right{visibility:hidden}
  .mode-links-bar{display:flex;width:100%;margin-top:0;padding:14px 4px calc(14px + env(safe-area-inset-bottom,0px));border-radius:0;border-top:1px solid var(--bg);align-items:center}
}

/* ── ADMIN ── */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:none}
.admin-overlay.open{display:block}
.admin-panel{position:fixed;top:0;right:0;bottom:0;width:min(440px,100vw);background:#fff;z-index:501;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
@media(max-width:640px){.admin-panel{background:#0C0C0C}}
.admin-panel.open{transform:translateX(0)}
.admin-hdr{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--navy);z-index:2}
.admin-hdr-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--navy)}
.admin-hdr-right{display:flex;gap:6px;align-items:center}
.admin-tab-dd{padding:0 28px 0 10px;height:34px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;font-size:12px;font-family:'Jost',sans-serif;color:#fff;background:rgba(255,255,255,0.1) url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='rgba(255,255,255,.7)' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>") no-repeat calc(100% - 8px) center;cursor:pointer;outline:none;max-width:180px;box-sizing:border-box;-webkit-appearance:none;appearance:none}
.admin-close{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:6px;width:34px;height:34px;cursor:pointer;font-size:17px;color:#fff;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;box-sizing:border-box}
.admin-body{flex:1;overflow-y:auto;padding:16px}
.admin-section{margin-bottom:16px;border-radius:6px;overflow:hidden}
.admin-section:has(>.admin-sect-title){border:1px solid rgba(16,40,94,0.18)}
.admin-sect-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);font-family:'Jost',sans-serif;margin-bottom:0;padding:8px 10px;background:rgba(16,40,94,0.09);border-radius:0;border:none}
.admin-section.collapsible>.admin-sect-title{cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center}
.admin-section.collapsible>.admin-sect-title::after{content:'▾';font-size:14px}
.admin-section.collapsible.collapsed>.admin-sect-title::after{content:'▸'}
.admin-section.collapsible.collapsed>.admin-sect-body{display:none}
.admin-sect-body{padding:12px;background:#fff}
.af{margin-bottom:9px}
.al{font-size:11px;font-weight:500;color:var(--text2);font-family:'Jost',sans-serif;margin-bottom:3px;display:block;letter-spacing:.04em}
.ai{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:'Jost',sans-serif;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.ai-img-wrap{display:flex;align-items:center;gap:6px}
.ai-img-wrap .ai,.ai-img-wrap .ei{flex:1}
.ai-upload-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);flex:none}
.unit-sel{padding:9px 6px;border:1px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;font-size:13px;color:var(--text);background:#fff;flex:none;max-width:60px}
.ai-unit-sel{padding:7px 4px;border:1px solid var(--border);border-radius:var(--rs);font-family:'Jost',sans-serif;font-size:12px;color:var(--text);background:#fff;flex:none;max-width:52px}
.ai:focus{border-color:var(--navy)}
.ai::placeholder{color:#ccc}
.ai-row{display:flex;gap:6px}
.ai-sm{width:80px!important;flex:none!important}
.ai-check{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-family:'Jost',sans-serif;color:var(--text2)}
.ai-check input{cursor:pointer;accent-color:var(--navy)}
.admin-card{background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)}
.admin-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.admin-card-num{font-size:11px;color:var(--text3);font-family:'Jost',sans-serif}
.adel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;line-height:1;padding:2px 4px;border-radius:4px}
.adel:hover{color:#c0392b;background:#fef0ee}
.apin{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:4px;color:var(--text3)}
.apin.pinned{color:var(--gold)}
.apin:hover{background:rgba(198,162,74,0.1)}
.pdf-tpl-btn{padding:9px 8px;font-size:12px;font-family:'Jost',sans-serif;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text2);cursor:pointer;transition:all .15s}
.pdf-tpl-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.pdf-tpl-btn:hover{border-color:var(--navy)}
.dish-vis-btn{font-size:10px;font-family:'Jost',sans-serif;padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--text3);cursor:pointer;white-space:nowrap;line-height:1.4;transition:all .1s}
.dish-vis-active{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.dish-hid-btn.dish-hid-active{background:#f5f5f5;color:var(--text2);border-color:#bbb}
.dish-del-btn{color:#c62828;border-color:#ef9a9a}
.dish-del-btn:hover{background:#ffebee}
.aadd{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:var(--rs);background:none;color:var(--text3);font-size:12px;font-family:'Jost',sans-serif;cursor:pointer;transition:all .15s;margin-top:4px}
.aadd:hover{border-color:var(--navy);color:var(--navy)}
.asave{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:50px;font-size:13px;font-weight:500;font-family:'Jost',sans-serif;cursor:pointer;margin-top:6px;letter-spacing:.04em}
.adanger{width:100%;padding:10px;background:none;color:#c0392b;border:1px solid #f5c6c2;border-radius:50px;font-size:12px;font-family:'Jost',sans-serif;cursor:pointer;margin-top:6px}
.admin-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.admin-toggle:hover{border-color:var(--navy)}
.admin-toggle input[type=checkbox]{accent-color:var(--navy);cursor:pointer}
.admin-toggle label{font-size:12px;font-family:'Jost',sans-serif;color:var(--text);cursor:pointer;flex:1}
.admin-badge{display:inline-block;font-size:10px;font-weight:600;padding:0 12px;height:34px;line-height:34px;border-radius:6px;background:var(--navy);color:#fff;font-family:'Jost',sans-serif;letter-spacing:.08em;box-sizing:border-box;border:1px solid rgba(255,255,255,0.2)}
.badge-group{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:8px}
.badge-check{display:flex;align-items:center;gap:4px;font-size:11px;font-family:'Jost',sans-serif;color:var(--text2);cursor:pointer}
.badge-check img{width:16px;height:16px;object-fit:contain}
.badge-check input{accent-color:var(--navy);cursor:pointer}

/* ── CONFIRM MODAL ── */
.confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1300;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:#fff;border-radius:12px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}
.confirm-text{font-size:13px;color:var(--text2);font-family:'Jost',sans-serif;line-height:1.5;margin-bottom:20px}
.confirm-btns{display:flex;gap:8px}
.confirm-cancel{flex:1;padding:11px;border:1px solid var(--border);border-radius:50px;background:#fff;font-size:13px;font-family:'Jost',sans-serif;cursor:pointer;color:var(--text2)}
.confirm-ok{flex:1;padding:11px;border:none;border-radius:50px;background:#c0392b;color:#fff;font-size:13px;font-family:'Jost',sans-serif;cursor:pointer;font-weight:500}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:9px 18px;border-radius:50px;font-size:12px;font-family:'Jost',sans-serif;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.img-wrap{position:relative;display:inline-block;flex:none;cursor:pointer}
.img-wrap .zoom-ic{display:none}
.gc-wrap{position:relative;cursor:pointer;display:block}
.gc-wrap .zoom-ic{display:none}

.drag-handle{cursor:grab;padding:4px 6px 4px 2px;color:var(--text3);font-size:16px;line-height:1;user-select:none;flex:none;-webkit-user-drag:element}
.drag-handle:active{cursor:grabbing}
.admin-card.dragging{opacity:.4;border:2px dashed var(--navy)}
.admin-card.drag-over{border-top:3px solid var(--navy)}

let lbImages=[], lbIdx=0;

// ═══════════════════════════════════════════
// STABLE DISH IDS (for "Plats à la une" pins)
// ═══════════════════════════════════════════
// BUG FIX: pinned dishes used to be stored as raw {tabId, cardIdx, dishIdx}
// array positions. Any later reorder/delete of dishes or sections (drag &
// drop, deleting a dish above it, etc.) silently shifted those positions,
// so a pin would end up pointing at a completely different dish — exactly
// the "I click on dish A and dish B opens instead" symptom. Dishes now get a
// permanent random id (_pid) the moment they're created, and pins are
// resolved by that id instead of by position, so reordering/deleting other
// dishes can never make a pin point at the wrong one again.
function genPid(){ return 'd_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function ensureDishPid(d){ if(d && !d._pid) d._pid=genPid(); return d&&d._pid; }
// Walk every dish in DATA and assign a stable id to any that doesn't have one yet.
function ensureAllDishPids(){
  (DATA.tabs||[]).forEach(tab=>{
    (tab.cards||[]).forEach(card=>{
      (card.dishes||[]).forEach(d=>ensureDishPid(d));
    });
  });
}
// One-time migration: upgrade old-format pins (position-based) to the new
// id-based format, using their current (possibly already-wrong) position as
// a best-effort resolution — this can't undo damage already caused by the
// bug, but from this point on pins stay correct through any reordering.
function migratePins(){
  ensureAllDishPids();
  const pins=DATA.pinnedDishes||[];
  const migrated=[];
  pins.forEach(p=>{
    if(p.pid){ migrated.push(p); return; }
    const tb=DATA.tabs.find(t=>t.id===p.tabId);
    const card=tb&&tb.cards[p.cardIdx];
    const d=card&&card.dishes&&card.dishes[p.dishIdx];
    if(d){ ensureDishPid(d); migrated.push({tabId:p.tabId, pid:d._pid}); }
    // else: dish no longer exists at that position — drop the stale pin
  });
  DATA.pinnedDishes=migrated;
}
// Resolve a pin to its live dish (searches by stable id, so it's immune to
// any later reordering of sections/dishes). Returns null if the dish was
// deleted since being pinned.
function resolvePin(p){
  const tb=DATA.tabs.find(t=>t.id===p.tabId);
  if(!tb) return null;
  for(let ci=0; ci<tb.cards.length; ci++){
    const card=tb.cards[ci];
    if(!card.dishes) continue;
    for(let di=0; di<card.dishes.length; di++){
      if(card.dishes[di]._pid===p.pid) return {tab:tb, ci, di, dish:card.dishes[di]};
    }
  }
  return null;
}

// DEEP LINKS — each tab gets its own shareable/bookmarkable URL (#tabId)
// ═══════════════════════════════════════════
function tabIdFromHash(){
  const raw=decodeURIComponent((location.hash||'').replace(/^#/,''));
  return raw||null;
}
// Called at the end of every renderAll() — keeps the address bar's #hash
// matching whichever tab is actually showing, for every call site that
// changes currentTabId (nav click, swipe, admin actions...), without
// spamming the browser history (uses replaceState).
function syncHashToCurrentTab(){
  if(!currentTabId) return;
  const newHash='#'+encodeURIComponent(currentTabId);
  if(location.hash!==newHash){
    try{ history.replaceState(null,'',newHash); }catch(e){}
  }
}
// Deliberate navigation (nav tab click, swipe) — creates a real history
// entry so the back/forward buttons step through tabs naturally.
function goToTab(tabId){
  currentTabId=tabId;
  sessionStorage.setItem('lastTabId',tabId);
  const newHash='#'+encodeURIComponent(tabId);
  if(location.hash!==newHash){
    try{ history.pushState(null,'',newHash); }catch(e){}
  }
  renderAll();
}
// Handles browser Back/Forward and someone pasting a #tab link while the page is already open.
window.addEventListener('popstate', ()=>{
  const raw=tabIdFromHash();
  if(raw && DATA.tabs.some(tb=>tb.id===raw && tb.visible!==false) && raw!==currentTabId){
    currentTabId=raw;
    sessionStorage.setItem('lastTabId',raw);
    renderAll();
  }
});

  const el=document.getElementById('toast');
  el.textContent=msg; el.style.opacity='1';

  const btnEdit=document.getElementById('btnEdit'); if(btnEdit) btnEdit.classList.toggle('active',on);
  const btnRead=document.getElementById('btnRead'); if(btnRead) btnRead.classList.toggle('active',!on);

  const linkRead=document.getElementById('modeLinkRead'); if(linkRead) linkRead.classList.toggle('active',!on);

  showToast(on?'Mode modification — cliquez un élément':'Mode lecture');
}

function escAttr(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escHtml(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// bilingual field: FR value shown as placeholder when editing another language
function efBi(label,frVal,curVal,isText){
  const isFr=lang==='fr';
  const langTag=isFr?'':` <span style="color:var(--text3);font-weight:400">(${lang.toUpperCase()})</span>`;
  const ph=isFr?'':(frVal||'');
  const inp=isText
    ? `<textarea class="ei" data-ef rows="3">${escHtml(curVal||'')}</textarea>`
    : `<input class="ei" data-ef value="${escAttr(curVal||'')}" placeholder="${escAttr(ph)}">`;
  return `<div class="ef"><label class="el">${label}${langTag}</label>${inp}</div>`;
}
function readEf(idx){ const els=document.querySelectorAll('#editPopBody [data-ef]'); return els[idx]?els[idx].value:''; }

// ---- Popup image field (URL + upload button + preview) — mirrors admin's imgFieldHtml ----
function efImgField(id, val, label){
  const previewStyle = val ? '' : 'display:none';
  return `<div class="ef"><label class="el">${label}</label><div class="ai-img-wrap">
    <input class="ei" id="${id}" value="${escAttr(val||'')}" placeholder="Image URL" oninput="syncEfImgPreview(this)">
    <label class="ai-upload-btn" title="Uploader une image"><input type="file" accept="image/*" style="display:none" onchange="uploadEditImgFile(this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path></svg></label>
  </div><img class="ai-img-preview" src="${escAttr(val||'')}" style="${previewStyle};width:100%;max-width:120px;aspect-ratio:1;object-fit:cover;border-radius:6px;margin-top:6px;border:1px solid var(--border)" onerror="this.style.display='none'"></div>`;
}
function uploadEditImgFile(fileInput){
  const file=fileInput.files[0];
  readImageFileSafe(file, dataUrl => {
    const wrap=fileInput.closest('.ai-img-wrap');
    const inp=wrap&&wrap.querySelector('.ei');
    if(!inp) return;
    inp.value=dataUrl;
    syncEfImgPreview(inp);
  });
}
function syncEfImgPreview(input){
  const wrap=input.closest('.ai-img-wrap');
  if(!wrap) return;
  const preview=wrap.parentElement.querySelector('.ai-img-preview');
  if(!preview) return;
  const val=input.value.trim();
  if(val){ preview.src=val; preview.style.display='block'; }
  else { preview.style.display='none'; }
}

function efSetHidden(val){
  if(!editCtx) return;

function efDeleteCurrent(){
  if(!editCtx) return;
  const {type,ti,ci,di,ii}=editCtx;
  const msg = type==='dish' ? 'Supprimer ce plat ?' : 'Supprimer cette boisson ?';
  askConfirm(msg, ()=>{
    if(type==='dish' && DATA.tabs[ti]?.cards[ci]?.dishes) DATA.tabs[ti].cards[ci].dishes.splice(di,1);
    else if(type==='bev' && DATA.tabs[ti]?.cards[ci]?.items) DATA.tabs[ti].cards[ci].items.splice(ii,1);
    renderAll();
    closeEditPop();
    if(typeof adminCurrentTab!=='undefined' && adminCurrentTab && document.getElementById('adminBody')?.innerHTML) renderAdminSection(adminCurrentTab, true);

// ---- SAVE ----
function saveEditPop(silent){
  if(!editCtx) return true;
  try{
    const {type,ti,ci,di,ii,si}=editCtx;
    if(type==='intro'){
      DATA.intro.active=document.getElementById('ed-intro-active').checked;
      if(typeof DATA.intro.text!=='object') DATA.intro.text={fr:''};
      DATA.intro.text[lang]=readEf(0);
      renderAll(); closeEditPop(); if(!silent) showToast('Enregistré — Publiez pour mettre en ligne'); return true;
    }
    if(type==='special'){
      const sp=DATA.specials[si];
      sp.active=document.getElementById('ed-sp-active').checked;
      if(typeof sp.title!=='object') sp.title={fr:''};
      if(typeof sp.desc!=='object') sp.desc={fr:''};
      sp.title[lang]=readEf(0);
      sp.desc[lang]=readEf(1);
      sp.price=v('ed-sp-price');
      renderAll(); closeEditPop(); if(!silent) showToast('Enregistré — Publiez pour mettre en ligne'); return true;
    }
    if(type==='dish'){
      const d=DATA.tabs[ti].cards[ci].dishes[di];
      if(typeof d.name!=='object') d.name={fr:d.name||''};
      if(typeof d.desc!=='object') d.desc={fr:d.desc||''};
      d.name[lang]=readEf(0);
      d.desc[lang]=readEf(1);
      const dualCb=document.getElementById('ed-dual');
      if(dualCb&&dualCb.checked){
        d.priceType='dual';
        d.qty1=v('ed-q1'); d.p1=v('ed-p1'); d.qty2=v('ed-q2'); d.p2=v('ed-p2');
        d.price=`Les ${d.qty1||'?'} — ${d.p1||'?'}€ · Les ${d.qty2||'?'} — ${d.p2||'?'}€`;
      } else if(document.getElementById('ed-q1')){
        // was dual, still dual (non-huitres path keeps dual fields)
        d.qty1=v('ed-q1'); d.p1=v('ed-p1'); d.qty2=v('ed-q2'); d.p2=v('ed-p2');
        d.price=`Les ${d.qty1||'?'} — ${d.p1||'?'}€ · Les ${d.qty2||'?'} — ${d.p2||'?'}€`;
      } else {
        d.priceType='';
        const pv=v('ed-price');
        d.price=pv?pv+'€':'';
      }
      d.img=v('ed-img');
      d.gallery=readGalleryFields();
      d.caption=v('ed-caption');
      readBadgeFields(d);
    } else if(type==='variants'){
      const card=DATA.tabs[ti].cards[ci];
      if(typeof card.label!=='object') card.label={fr:card.label||''};
      card.label[lang]=readEf(0);
      card.img=v('ed-img');
      const names=document.querySelectorAll('#ed-variants [data-vname]');
      const prices=document.querySelectorAll('#ed-variants [data-vprice]');
      (card.variants||[]).forEach((vr,vi)=>{
        if(typeof vr.name!=='object') vr.name={fr:vr.name||''};
        if(names[vi]) vr.name[lang]=names[vi].value;
        if(prices[vi]) vr.price=prices[vi].value;
      });
    } else if(type==='bev'){
      const item=DATA.tabs[ti].cards[ci].items[ii];
      if(typeof item.name!=='object') item.name={fr:item.name||''};
      item.name[lang]=v('ed-bname');
      item.img=v('ed-img');
      const cls=document.querySelectorAll('#ed-sizes [data-scl]');
      const units=document.querySelectorAll('#ed-sizes [data-sunit]');
      const prs=document.querySelectorAll('#ed-sizes [data-sprice]');
      const sizes=[];
      cls.forEach((clEl,si2)=>{
        const cl=clEl.value.trim();
        const pr=prs[si2]?prs[si2].value.trim():'';
        const unit=units[si2]?units[si2].value:'cl';
        if(cl||pr) sizes.push({cl,unit,price:pr});
      });
      item.sizes=sizes;
      item.gallery=readGalleryFields();
      item.caption=v('ed-caption');
    }
    renderAll();
    closeEditPop();
    if(!silent) showToast('Enregistré — Publiez pour mettre en ligne');
    if(typeof adminCurrentTab!=='undefined' && adminCurrentTab && document.getElementById('adminBody')?.innerHTML) renderAdminSection(adminCurrentTab, true);
    return true;
  }catch(e){
    console.error('saveEditPop error:', e);
    showToast('❌ Erreur lors de l\'enregistrement : '+e.message);
    return false;
  }
}

// BUG FIX: this used to collect images from every tab, which meant opening a
// dish's photo let you Next/Prev through *every other tab's* dishes too.
// Now scoped to the tab currently on screen only.
function collectLbImages(){
  lbImages=[];
  const tab=DATA.tabs.find(tb=>tb.id===currentTabId);
  if(!tab) return;
  const cat=t(tab.label);
  tab.cards.forEach(card=>{
    if(card.dishes) card.dishes.filter(d=>!d.hidden).forEach(d=>{ if(d.img) lbImages.push({src:d.img,name:t(d.name),desc:t(d.desc)||'',cat}); });
    if(card.img && !card.dishes) lbImages.push({src:card.img,name:t(card.label),desc:'',cat});
  });
}
// ── LIGHTBOX MODE FLAG ──
// 'pin' = plats à la une (4 slides indépendantes), 'normal' = lb standard
let lbMode='normal';

// Mini lightbox for pinned dishes — independent slides, own counter
let pinLbDishes=[], pinLbIdx=0;
function openPinLb(idx){
  if(editMode){ const p=(DATA.pinnedDishes||[])[idx]; if(p){ const r=resolvePin(p); if(r){ const ti=DATA.tabs.indexOf(r.tab); openEditDish(ti,r.ci,r.di); } } return; }
  const pins=DATA.pinnedDishes||[];
  pinLbDishes=pins.map(p=>{
    const r=resolvePin(p);
    return (r&&r.dish&&!r.dish.hidden)?r.dish:null;  // exclude hidden / deleted
  }).filter(Boolean).slice(0,4);
  if(!pinLbDishes.length) return;
  lbMode='pin';
  pinLbIdx=Math.min(idx,pinLbDishes.length-1);
  renderPinLb();
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
}
function renderPinLb(){
  const d=pinLbDishes[pinLbIdx];
  if(!d) return;

// Swipe support
(function(){
  let sx=0,sy=0;
  const lb=document.getElementById('lb');
  lb.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
  lb.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;

})();

function renderAll(){
  // BUG FIX: isHome must always track array position 0, never a stale flag
  // left over from before a tab reorder (drag & drop) or before the
  // dedicated Accueil (__home) tab was toggled on/off/unshifted. Without
  // this, a formerly-first tab (e.g. "Dopbap") keeps isHome:true forever,
  // so "Nos incontournables" (pinned dishes) wrongly renders twice — once
  // on Accueil, once on that stale tab.
  DATA.tabs.forEach((t,i)=>{ t.isHome = (i===0); });
  // If current tab was hidden, reset to first visible
  if(!DATA.tabs.filter(t=>t.visible!==false).some(t=>t.id===currentTabId)){
    const first=DATA.tabs.find(t=>t.visible!==false);
    if(first) currentTabId=first.id;
  }
  syncHashToCurrentTab();
  collectLbImages(); renderNav(); renderTabs(); renderViewBar();
  const subEl=document.getElementById('heroSubEl');
  if(subEl){ const st=DATA.hero?t(DATA.hero):''; subEl.textContent=st; subEl.style.display=st?'block':'none'; }
  applyRestaurantBranding();
  // Global social bar above reserve CTA
  const soc=DATA.social||{};
  const sb=document.getElementById('globalSocialBar');
  if(sb){
    const sLinks=[];
    if(soc.instagram) sLinks.push(`<a class="social-link-txt" href="https://instagram.com/${soc.instagram.replace('@','')}" target="_blank">INSTAGRAM</a>`);
    if(soc.tiktok) sLinks.push(`<a class="social-link-txt" href="https://tiktok.com/@${soc.tiktok.replace('@','')}" target="_blank">TIKTOK</a>`);
    if(soc.facebook) sLinks.push(`<a class="social-link-txt" href="https://facebook.com/${soc.facebook.replace('@','')}" target="_blank">FACEBOOK</a>`);
    if(soc.website){
      const wsUrl=/^https?:\/\//.test(soc.website)?soc.website:'https://'+soc.website;
      sLinks.push(`<a class="social-link-txt" href="${wsUrl}" target="_blank" rel="noopener">SITE WEB</a>`);
    }
    sb.innerHTML=sLinks.length?`<div class="social-links-bar">${sLinks.join('<span class="social-link-sep">·</span>')}</div>`:'';
  }
}

function renderNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  DATA.tabs.filter(tab=>tab.visible!==false).forEach(tab=>{
    const el=document.createElement('div');
    el.className='nav-tab'+(tab.id===currentTabId?' active':'');
    el.textContent=t(tab.label);
    el.addEventListener('click',()=>{
      if(tab.id==='__home' && DATA.homeTab&&DATA.homeTab.siteUrl){
        window.open(DATA.homeTab.siteUrl,'_blank');
        return;
      }
      goToTab(tab.id);
    });
    nav.appendChild(el);
  });
  // Scroll nav: show active + 2 full + half of 3rd on each side (Twitter-style)
  setTimeout(()=>{
    const activeEl=nav.querySelector('.nav-tab.active');
    if(!activeEl) return;
    const navBar=nav.closest('.nav-bar')||nav.parentElement;
    const tabs=Array.from(nav.querySelectorAll('.nav-tab'));
    const activeIdx=tabs.indexOf(activeEl);
    const barW=navBar.offsetWidth;
    const totalW=nav.scrollWidth;

    // Compute target: position scroll so active tab sits at left + 16px padding,
    // letting the next 2 full + half of 3rd peek to the right naturally
    // For the last tabs, scroll back so 2 prev + half peek on the left
    const nextTabs=tabs.slice(activeIdx+1, activeIdx+4);
    const prevTabs=tabs.slice(Math.max(0,activeIdx-3), activeIdx);
    const nextW=nextTabs.reduce((s,el)=>s+el.offsetWidth,0);
    const prevW=prevTabs.reduce((s,el)=>s+el.offsetWidth,0);
    const halfNext=nextTabs[2]?nextTabs[2].offsetWidth/2:(nextTabs[1]?nextTabs[1].offsetWidth/2:40);
    const halfPrev=prevTabs[0]?prevTabs[0].offsetWidth/2:40;

    let target;
    const hasNext=activeIdx<tabs.length-1;
    const hasPrev=activeIdx>0;

    if(hasNext&&hasPrev){
      // Middle: show active at ~left-quarter, peek both sides
      const rightPeek=nextW-halfNext;
      target=activeEl.offsetLeft-(barW-activeEl.offsetWidth-rightPeek)/2;
    } else if(hasNext){
      // First tab(s): start from left, just show naturally
      target=0;
    } else {
      // Last tab(s): scroll so 2 prev + half show on left
      target=totalW-barW;
    }

    target=Math.max(0, Math.min(target, totalW-barW));

    // Only scroll if needed, use smooth for non-initial renders
    if(Math.abs(navBar.scrollLeft-target)>2){
      navBar.scrollTo({left:target, behavior:'smooth'});
    }
  },20);
}

function renderScheduleInline(){
  const sch=DATA.schedule||[];
  const now=new Date();
  let today=now.getDay(); let hour=now.getHours()+now.getMinutes()/60;
  if(hour<6){today=(today+6)%7;hour+=24;}
  const dayIdx=today===0?6:today-1;
  const dayData=sch[dayIdx]||{};
  const svcs=dayData.services||[];
  const allSvcs=svcs.length===0&&dayData.open!=null?[{label:'',open:dayData.open,close:dayData.close}]:svcs;
  let state='closed',label="Fermé";
  for(const s of allSvcs){
    if(s.open==null) continue;
    const openH=s.open; const closeH=s.close>24?s.close-24:s.close;
    const effectiveClose=s.close<=s.open?s.close+24:s.close;
    if(hour>=s.open&&hour<effectiveClose){state='open';label="Ouvert jusqu'à "+closeH+'h';break;}
    if(hour<s.open){state='soon';label='Ouvre à '+s.open+'h';}
  }
  const dotClass=state==='open'?'open':state==='soon'?'soon':'closed';
  const rows=sch.map((d,i)=>{
    const isToday=(i===dayIdx);
    const svs=(d.services||[]).length>0?d.services:(d.open!=null?[{label:'',open:d.open,close:d.close}]:[]);
    const h=svs.length===0?'Fermé':svs.map(s=>{
      const o=s.open!=null?s.open+'h':'';
      const c=s.close!=null?(s.close>24?(s.close-24)+'h':s.close+'h'):'';
      return o&&c?o+' – '+c:(s.label||'Fermé');
    }).join(', ');
    return `<div class="resto-popup-row${isToday?' today':''}"><span class="rday">${d.day}</span><span>${h}</span></div>`;
  }).join('');
  return `<div class="resto-badge-inline" id="schedBadge" onclick="toggleSchedPopup(event)" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0;position:relative;user-select:none">
    <span class="resto-dot ${dotClass}"></span>
    <span style="font-size:11px;color:var(--text2);font-family:Jost,sans-serif">${label}</span>
    <div class="resto-popup" id="schedPopup">
      <div class="resto-popup-title" style="color:${state==='open'?'#22c55e':state==='soon'?'#f97316':'#ef4444'}">Horaires d'ouverture</div>
      ${rows}
    </div>
  </div>`;
}

// ── SWIPE TO CHANGE TABS ──
(function(){
  // True carousel-style swipe: both the current tab panel and the
  // neighbor it's revealing move together as one continuous surface,
  // like Twitter — never a disappear/reappear. All tabs already exist in
  // the DOM (#tabsContainer renders every visible tab, just toggling
  // display via the .active class), so we temporarily position the
  // active panel and its neighbor side by side and translate both by the
  // same amount. Cleanup happens either by resetting inline styles (swipe
  // cancelled) or automatically via goToTab()'s renderAll(), which
  // rebuilds #tabsContainer from scratch and discards our inline styles.
  let tsX=0,tsY=0,isDragging=false,dragLocked=false,dir=0;
  let activeEl=null,neighborEl=null,containerEl=null,prevContainerStyle=null;
  const THRESHOLD=0.12; // 12% of screen width to commit — light swipe enough

  function resetPanel(el){
    if(!el) return;
    el.style.position='';el.style.top='';el.style.left='';el.style.width='';
    el.style.transition='';el.style.transform='';el.style.display='';
  }
  function cleanupSlide(){
    if(containerEl&&prevContainerStyle){
      containerEl.style.position=prevContainerStyle.position;
      containerEl.style.overflow=prevContainerStyle.overflow;
      containerEl.style.height=prevContainerStyle.height;
    }
    resetPanel(activeEl);
    resetPanel(neighborEl);
    activeEl=null;neighborEl=null;containerEl=null;prevContainerStyle=null;dir=0;
  }

  document.addEventListener('touchstart',e=>{
    if(document.getElementById('adminPanel')?.classList.contains('open')) return;
    // Don't intercept touches on nav-bar, lightbox, admin, inputs
    if(e.target.closest('.nav-bar,.lb,.admin-panel,input,textarea,select,button')) return;
    tsX=e.touches[0].clientX;
    tsY=e.touches[0].clientY;
    isDragging=false;
    dragLocked=false;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(document.getElementById('adminPanel')?.classList.contains('open')) return;
    if(dragLocked) return;
    if(e.target.closest('.nav-bar,.lb,.admin-panel,input,textarea,select')) return;
    const dx=e.touches[0].clientX-tsX;
    const dy=e.touches[0].clientY-tsY;
    // Lock to vertical scroll if clearly scrolling up/down
    if(!isDragging&&Math.abs(dy)>Math.abs(dx)*1.5+4){ dragLocked=true; return; }
    if(!isDragging&&Math.abs(dx)>6){
      isDragging=true;
      const vis=DATA.tabs.filter(tb=>tb.visible!==false);
      const idx=vis.findIndex(tb=>tb.id===currentTabId);
      dir=dx<0?1:-1; // 1 = swiping to next tab, -1 = swiping to previous
      const newIdx=idx+dir;
      if(newIdx<0||newIdx>=vis.length){ dir=0; return; } // no neighbour that way
      containerEl=document.getElementById('tabsContainer');
      activeEl=document.getElementById('tab-'+currentTabId);
      neighborEl=document.getElementById('tab-'+vis[newIdx].id);
      if(!containerEl||!activeEl||!neighborEl){ dir=0;activeEl=null;neighborEl=null;containerEl=null; return; }
      const W=window.innerWidth;
      prevContainerStyle={position:containerEl.style.position,overflow:containerEl.style.overflow,height:containerEl.style.height};
      containerEl.style.position='relative';
      containerEl.style.overflow='hidden';
      containerEl.style.height=activeEl.offsetHeight+'px';
      activeEl.style.position='absolute';
      activeEl.style.top='0'; activeEl.style.left='0'; activeEl.style.width='100%';
      activeEl.style.transition='none';
      neighborEl.style.display='block';
      neighborEl.style.position='absolute';
      neighborEl.style.top='0'; neighborEl.style.width='100%';
      neighborEl.style.left=(dir>0?W:-W)+'px';
      neighborEl.style.transition='none';
    }
    if(!isDragging||dir===0) return;
    // Move both panels together with the finger — the neighbour follows
    // right along at its fixed offset, so it visibly slides in as the
    // active panel slides out, instead of a cut between two states.
    activeEl.style.transform=`translate3d(${dx}px,0,0)`;
    neighborEl.style.transform=`translate3d(${dx}px,0,0)`;
  },{passive:true});

  document.addEventListener('touchend',e=>{
    const wasDragging=isDragging;
    isDragging=false;
    dragLocked=false;
    // Pure tap — reset any stray transform and let click fire normally
    if(!wasDragging){ cleanupSlide(); return; }
    if(document.getElementById('adminPanel')?.classList.contains('open')){ cleanupSlide(); return; }
    if(dir===0||!activeEl||!neighborEl){ cleanupSlide(); return; }
    const dx=e.changedTouches[0].clientX-tsX;
    const W=window.innerWidth;
    const vis=DATA.tabs.filter(tb=>tb.visible!==false);
    const idx=vis.findIndex(tb=>tb.id===currentTabId);
    const newIdx=idx+dir;
    const _active=activeEl,_neighbor=neighborEl;
    if(Math.abs(dx)>W*THRESHOLD&&newIdx>=0&&newIdx<vis.length){
      _active.style.transition='transform .2s ease';
      _neighbor.style.transition='transform .2s ease';
      _active.style.transform=`translate3d(${-dir*W}px,0,0)`;
      _neighbor.style.transform='translate3d(0,0,0)';
      setTimeout(()=>{
        cleanupSlide();
        goToTab(vis[newIdx].id);
      },200);
    } else {
      _active.style.transition='transform .2s ease';
      _neighbor.style.transition='transform .2s ease';
      _active.style.transform='translate3d(0,0,0)';
      _neighbor.style.transform=`translate3d(${dir*W}px,0,0)`;
      setTimeout(cleanupSlide,220);
    }
  });
})();

function renderTabContent(tab,lbOffset){
  let imgIdx=lbOffset;
  let html='<div class="cards-stack">';

  // ACTUAL HOME TAB
  if(tab.id==='__home'){
    // 1. Description first

      const soc=DATA.social||{};
      html+=`<div class="intro-card" data-edit="intro"><div class="intro-card-label">À propos</div><div class="intro-card-text">${t(DATA.intro.text)}</div></div>`;
    }
    // 2. Media (photo or video)
    if(DATA.homeTab&&DATA.homeTab.video){
      const videoUrl=DATA.homeTab.video;
      let embedUrl='';
      const ytMatch=videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
      const vimeoMatch=videoUrl.match(/vimeo\.com\/([\d]+)/);
      if(ytMatch) embedUrl=`https://www.youtube.com/embed/${ytMatch[1]}?autoplay=0&rel=0&controls=0&modestbranding=1&showinfo=0`;
      else if(vimeoMatch) embedUrl=`https://player.vimeo.com/video/${vimeoMatch[1]}?controls=0&title=0&byline=0&portrait=0`;
      else embedUrl=videoUrl;
      if(embedUrl) html+=`<div class="home-photo-wrap" style="aspect-ratio:4/3;background:#000"><iframe src="${embedUrl+(embedUrl.includes('?')?'&':'?')+'autoplay=1&mute=1&controls=0&loop=1&playsinline=1'}" style="width:100%;height:100%;border:none;pointer-events:none" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe></div>`;
    } else if(DATA.homeTab&&DATA.homeTab.photo){
      html+=`<div class="home-photo-wrap"><img class="home-photo" src="${DATA.homeTab.photo}" alt="Photo restaurant" loading="lazy"></div>`;
    }
    // 3. Specials + info banners
    DATA.specials.forEach(sp=>{
      if(sp.active&&(sp.showHome!==false)){
        html+=renderBanner(sp);
      }
    });
    if(DATA.infoBanner&&DATA.infoBanner.active&&(DATA.infoBanner.showHome!==false)){
      html+=renderInfoBanner(DATA.infoBanner);
    }
    // Pinned dishes on home tab — own mini lightbox
    const pins2=DATA.pinnedDishes||[];
    const pinDishes2=pins2.map(p=>{ const r=resolvePin(p); return r?{...r.dish}:null; }).filter(Boolean).slice(0,4);
    if(pinDishes2.length>0&&(DATA.pinnedShowHome!==false)){

          <span style="color:var(--gold)">★</span> Nos incontournables <span style="color:var(--gold)">★</span>
        </div>
        <div class="featured-grid">`;
        pinDishes2.forEach((d,idx)=>{ html+=`<div class="featured-item" style="cursor:pointer" onclick="openPinLb(${idx})">${d.img?`<img class="featured-item-img" src="${d.img}" alt="" loading="lazy">`:'<div class="featured-item-img"></div>'}<div class="featured-item-body"><div class="featured-item-name">${t(d.name)}</div><div class="featured-item-price">${(d.price||"").toString().includes("€")?(d.price||""):(d.price?(d.price+"€"):"")}</div></div></div>`; });
        html+=`</div></div>`;
      } else {
        // list view
        html+=`<div class="card" style="border:1.5px solid var(--gold)"><div class="card-hdr" style="border-bottom:1px solid rgba(198,162,74,0.3)"><span class="card-label" style="color:var(--gold)">★ Nos incontournables ★</span></div><div class="card-body">`;
        pinDishes2.forEach((d,idx)=>{
          html+=`<div class="dish-row dish-row-clickable" onclick="openPinLb(${idx})">`;

  // OLD HOME: specials + intro + featured

      const soc=DATA.social||{};
      html+=`<div class="intro-card" data-edit="intro"><div class="intro-card-label">À propos</div><div class="intro-card-text">${t(DATA.intro.text)}</div></div>`;

      html+=`</div></div>`;
    }

  if(view==='grid' && !['boissons'].includes(tab.id)){

    tab.cards.forEach(card=>{
      if(card.type==='bevs') return;
      if(card.type==='variants'){

// ═══════════════════════════════════════════
function renderScheduleWidget(){
  const sch = DATA.schedule||[];
  const now = new Date();
  let today = now.getDay();
  let hour = now.getHours() + now.getMinutes()/60;
  if(hour < 6){ today=(today+6)%7; hour+=24; }
  const dayIdx = today===0 ? 6 : today-1;
  const dayData = sch[dayIdx]||{};
  const svcs = dayData.services||[];
  // Compat: old format {open,close}
  const allSvcs = svcs.length===0&&dayData.open!=null ? [{label:'',open:dayData.open,close:dayData.close}] : svcs;
  let state='closed', label="Fermé aujourd'hui";
  for(const s of allSvcs){
    if(s.open==null) continue;
    const effClose=s.close<=s.open?s.close+24:s.close;
    if(hour>=s.open&&hour<effClose){ state='open'; label="Ouvert jusqu'à "+s.close+'h'+(s.label?' · '+s.label:''); break; }
    if(hour<s.open){ state='soon'; label='Ouvre à '+s.open+'h'+(s.label?' · '+s.label:''); }
  }

  const rows = sch.map((d,i)=>{
    const isToday=(i===dayIdx);
    const svs=(d.services||[]).length>0?d.services:(d.open!=null?[{label:'',open:d.open,close:d.close}]:[]);
    const h=svs.length===0?'Fermé':svs.map(s=>s.open+'h – '+(s.close%24)+'h'+(s.label?' ('+s.label+')':'')).join(', ');
    return `<div class="resto-popup-row${isToday?' today':''}"><span class="rday">${d.day}</span><span>${h}</span></div>`;
  }).join('');

  return `<div class="home-schedule-row">
    <span class="home-schedule-label">Horaires</span>
    <div class="resto-badge" id="schedBadge" onclick="toggleSchedPopup(event)">
      <span class="resto-dot ${state}"></span>
      <span>${label}</span>
      <div class="resto-popup" id="schedPopup">
        <div class="resto-popup-arrow"></div>
        <div class="resto-popup-title" style="color:${state==='open'?'#22c55e':state==='soon'?'#f97316':'#ef4444'}">Horaires d'ouverture</div>
        ${rows}
      </div>
    </div>
  </div>`;
}

function toggleSchedPopup(e){
  e.stopPropagation();
  const p=document.getElementById('schedPopup');
  const badge=document.getElementById('schedBadge');
  if(p.classList.contains('visible')){ p.classList.remove('visible'); return; }
  const rect=badge.getBoundingClientRect();
  const pw=268;
  const vw=window.innerWidth;
  let left=rect.right-pw;
  if(left<12) left=12;
  if(left+pw>vw-12) left=vw-pw-12;
  // Open downward below the badge
  const top=rect.bottom+8;
  p.style.left=left+'px';
  p.style.top=top+'px';
  p.style.transform='none';
  p.classList.add('visible');
}
// Close schedule popup on outside click
document.addEventListener('click', function(){
  const p=document.getElementById('schedPopup');
  if(p) p.classList.remove('visible');
});

let dragTabSrc=null;
function onDragTab(e,ti){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') { e.preventDefault(); return; } dragTabSrc=ti; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onDropTab(e,ti){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(dragTabSrc===null||dragTabSrc===ti) return;
  const tabs=DATA.tabs;
  const [moved]=tabs.splice(dragTabSrc,1);
  tabs.splice(ti,0,moved);
  dragTabSrc=null;
  currentTabId=DATA.tabs[0]?.id;
  renderAll(); renderAdminTabDd(); renderAdminSection('__reorder');
  showToast('Ordre mis à jour');
}

// Touch drag for mobile reorder
(function(){
  let touchSrc=null, touchEl=null, ghost=null, listEl=null;
  document.addEventListener('touchstart',e=>{
    const handle=e.target.closest('.drag-handle');
    if(!handle) return;
    const card=handle.closest('[data-ti]');
    if(!card) return;
    touchSrc=parseInt(card.dataset.ti);
    touchEl=card;
    listEl=card.parentElement;
    ghost=card.cloneNode(true);
    ghost.style.cssText='position:fixed;opacity:.6;pointer-events:none;z-index:9999;width:'+card.offsetWidth+'px;background:#e8edf5;border-radius:8px;';
    document.body.appendChild(ghost);
    card.style.opacity='.3';
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(touchSrc===null) return;
    e.preventDefault();
    const t=e.touches[0];
    ghost.style.left=(t.clientX-80)+'px';
    ghost.style.top=(t.clientY-20)+'px';
    // find target
    const els=Array.from(listEl.querySelectorAll('[data-ti]'));
    els.forEach(el=>{
      const r=el.getBoundingClientRect();
      if(t.clientY>r.top&&t.clientY<r.bottom&&el!==touchEl){
        el.style.borderTop='3px solid var(--navy)';
      } else {
        el.style.borderTop='';
      }
    });
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(touchSrc===null) return;
    const t=e.changedTouches[0];
    const els=Array.from(listEl.querySelectorAll('[data-ti]'));
    let targetTi=null;
    els.forEach(el=>{
      el.style.borderTop='';
      const r=el.getBoundingClientRect();
      if(t.clientY>r.top&&t.clientY<r.bottom&&el!==touchEl){
        targetTi=parseInt(el.dataset.ti);
      }
    });
    if(ghost) ghost.remove();
    if(touchEl) touchEl.style.opacity='';
    if(targetTi!==null && targetTi!==touchSrc){
      const tabs=DATA.tabs;
      const [moved]=tabs.splice(touchSrc,1);
      tabs.splice(targetTi,0,moved);
      currentTabId=DATA.tabs[0]?.id;
      renderAll(); renderAdminTabDd(); renderAdminSection('__reorder');
      showToast('Ordre mis à jour');
    }
    touchSrc=null; touchEl=null; ghost=null;
  });
})();

function getAdminOpenSections(){
  const body=document.getElementById('adminBody');
  if(!body) return [];
  return Array.from(body.querySelectorAll('.admin-section.collapsible')).map((s,i)=>({i,open:!s.classList.contains('collapsed'),title:s.querySelector('.admin-sect-title')?.textContent?.trim().slice(0,40)||''}));
}
function restoreAdminOpenSections(states){
  const body=document.getElementById('adminBody');
  if(!body||!states||!states.length) return;
  const secs=body.querySelectorAll('.admin-section.collapsible');
  secs.forEach((s,i)=>{
    const st=states.find(x=>x.i===i);
    if(st){ if(st.open) s.classList.remove('collapsed'); else s.classList.add('collapsed'); }
  });
}
function renderAdminSection(tid, _skipScroll){
  const body=document.getElementById('adminBody');
  const prevStates=getAdminOpenSections();
  const prevScroll=body?body.scrollTop:0;
  adminCurrentTab=tid;
  if(tid==='__global'){
    body.innerHTML=renderAdminGlobal()+adminSaveBar();
  } else if(tid==='__home'){
    body.innerHTML=renderAdminHomeTab()+adminSaveBar();
  } else if(tid==='__social'){
    body.innerHTML=renderSocialSection()+adminSaveBar();
  } else if(tid==='__reorder'){
    body.innerHTML=renderTabReorder();
  } else {
    const ti=DATA.tabs.findIndex(tb=>tb.id===tid);
    if(ti<0){body.innerHTML='';return;}
    body.innerHTML=renderAdminTab(ti);
  }
  restoreAdminOpenSections(prevStates);
  if(!_skipScroll) body.scrollTop=prevScroll;
  // bind inputs
  body.querySelectorAll('.ai[data-bind]').forEach(input=>input.addEventListener('input',()=>applyBind(input)));
  body.querySelectorAll('.ai[data-bind]').forEach(input=>input.addEventListener('change',()=>applyBind(input)));
  if(document.getElementById('pdfPreviewFrame')) setTimeout(()=>{ if(typeof updatePdfPreview==='function') updatePdfPreview(); }, 100);
}

function applyBind(input){
  const path=input.dataset.bind.split('.');
  let obj=DATA;
  for(let i=0;i<path.length-1;i++) obj=obj[path[i]];
  const key=path[path.length-1];
  if(input.type==='checkbox') obj[key]=input.checked; else obj[key]=input.value;
  renderAll();
}

function deepSet(obj,path,val){
  const parts=path.split('.');
  for(let i=0;i<parts.length-1;i++) obj=obj[parts[i]];
  obj[parts[parts.length-1]]=val;
}

// Helper: render a bilingual input field
// Shows FR value as placeholder when editing another lang
function biInput(label, frVal, targetVal, onInputCode, multiline){
  const isFr = adminLang==='fr';
  const placeholder = isFr ? '' : (frVal||'');
  const value = targetVal||'';
  const langLabel = adminLang.toUpperCase();
  const escapedVal = value.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const field = multiline
    ? `<textarea class="ai" rows="5" style="resize:vertical;min-height:90px;padding:8px" placeholder="${placeholder.replace(/"/g,'&quot;')}" oninput="${onInputCode}">${escapedVal}</textarea>`
    : `<input class="ai" value="${escapedVal.replace(/"/g,'&quot;')}" placeholder="${placeholder.replace(/"/g,'&quot;')}" oninput="${onInputCode}">`;
  return `<div class="af"><label class="al">${label}${isFr?'':` <span style="color:var(--text3);font-weight:400">(${langLabel})</span>`}</label>${field}</div>`;
}

let dragPinSrc=null;
// Desktop drag
function onDragPin(e,pi){ dragPinSrc=pi; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onDragPinEnd(e){ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.admin-card').forEach(el=>el.classList.remove('drag-over')); dragPinSrc=null; }
function onDragPinOver(e,pi){ if(dragPinSrc===null||dragPinSrc===pi)return; e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDropPin(e,pi){
  e.preventDefault();
  document.querySelectorAll('.admin-card').forEach(el=>el.classList.remove('drag-over'));
  if(dragPinSrc===null||dragPinSrc===pi)return;
  const pins=DATA.pinnedDishes||[];
  const [moved]=pins.splice(dragPinSrc,1);
  pins.splice(pi,0,moved);
  DATA.pinnedDishes=pins;
  dragPinSrc=null;
  renderAll();
  renderAdminSection(adminCurrentTab);
}
// Touch drag for mobile pins
(function(){
  let touchPinSrc=null, touchPinY=0, touchPinEl=null;
  document.addEventListener('touchstart',function(e){
    const handle=e.target.closest('.admin-card[data-pinidx]');
    if(!handle) return;
    touchPinSrc=parseInt(handle.dataset.pinidx);
    touchPinEl=handle;
    touchPinY=e.touches[0].clientY;
    handle.classList.add('dragging');
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(touchPinSrc===null||!touchPinEl) return;
    e.preventDefault();
    const y=e.touches[0].clientY;
    const els=document.querySelectorAll('.admin-card[data-pinidx]');
    els.forEach(el=>{
      const r=el.getBoundingClientRect();
      if(y>r.top&&y<r.bottom&&parseInt(el.dataset.pinidx)!==touchPinSrc){
        els.forEach(x=>x.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    });
  },{passive:false});
  document.addEventListener('touchend',function(e){
    if(touchPinSrc===null) return;
    const over=document.querySelector('.admin-card[data-pinidx].drag-over');
    if(over){
      const tgt=parseInt(over.dataset.pinidx);
      const pins=DATA.pinnedDishes||[];
      const [moved]=pins.splice(touchPinSrc,1);
      pins.splice(tgt,0,moved);
      DATA.pinnedDishes=pins;
      renderAll();
      renderAdminSection(adminCurrentTab);
    }
    document.querySelectorAll('.admin-card[data-pinidx]').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});
    touchPinSrc=null; touchPinEl=null;
  });
})();

function togglePin(tabId,ci,di){
  const tb=DATA.tabs.find(t=>t.id===tabId);
  const dish=tb&&tb.cards[ci]&&tb.cards[ci].dishes&&tb.cards[ci].dishes[di];
  if(!dish) return;
  ensureDishPid(dish);
  const pins=DATA.pinnedDishes||[];
  const idx=pins.findIndex(p=>p.tabId===tabId&&p.pid===dish._pid);
  if(idx>=0){ pins.splice(idx,1); }
  else if(pins.length<4){ pins.push({tabId,pid:dish._pid}); }
  else { showToast('Maximum 4 plats à la une'); return; }
  DATA.pinnedDishes=pins;
  renderAll();
  renderAdminSection(adminCurrentTab);
}

// BUG FIX: tab ids used to be random timestamps ("tab_1782264697487"), which
// meant a tab's shareable URL (#tab_...) never matched its actual name.
// New tabs now get a slug derived from their name instead.
function slugifyTabId(label){
  const base=(label||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // strip accents (é→e, etc.)
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'');
  return base||'tab';
}
function uniqueTabId(baseSlug, excludeTab){
  let slug=baseSlug, n=2;
  while(DATA.tabs.some(tb=>tb!==excludeTab && tb.id===slug)){ slug=baseSlug+'-'+n; n++; }
  return slug;
}
// One-time migration: any tab still carrying an old-style "tab_<timestamp>"
// id gets a proper name-based slug, with every reference to it (pins,
// current tab, last-visited tab) updated to match.
function migrateTabIds(){
  (DATA.tabs||[]).forEach(tab=>{
    if(!/^tab_\d+$/.test(tab.id)) return;
    const oldId=tab.id;
    const name=(tab.label&&(tab.label.fr||tab.label.en||Object.values(tab.label)[0]))||oldId;
    const newId=uniqueTabId(slugifyTabId(name), tab);
    tab.id=newId;
    (DATA.pinnedDishes||[]).forEach(p=>{ if(p.tabId===oldId) p.tabId=newId; });
    if(currentTabId===oldId) currentTabId=newId;
    if(sessionStorage.getItem('lastTabId')===oldId) sessionStorage.setItem('lastTabId',newId);
  });
}

    cards=[{label:{fr:'À la carte',en:'À la carte'},dishes:[]}];
  }
  const id=uniqueTabId(slugifyTabId(labelFr));
  DATA.tabs.push({id,label:{fr:labelFr,en:labelEn},cards});
  adminCurrentTab=id;
  currentTabId=id;
  renderAll();

  document.getElementById('adminTabDd').value=id;

}
