// GITHUB SYNC
// ═══════════════════════════════════════════
const GH_USER   = 'sowonboxx-cmd';
const GH_REPO   = 'menu';
const GH_BRANCH = 'main';
// Detect client slug from URL: /menu/drevici → 'drevici'
const _pathParts = window.location.pathname.replace(/\/+$/,'').replace(/^\/+/,'').split('/');
const CLIENT_SLUG = _pathParts[_pathParts.length - 1] || 'default';
const GH_FILE   = CLIENT_SLUG + '/menu.json';

function getToken(){ return localStorage.getItem('menu_gh_token')||localStorage.getItem('drevici_gh_token')||''; }
function saveToken(v){ if(v) localStorage.setItem('menu_gh_token',v); else localStorage.removeItem('menu_gh_token'); }
function getSha(){ return localStorage.getItem('gh_sha_'+CLIENT_SLUG)||null; }
function saveSha(v){ if(v) localStorage.setItem('gh_sha_'+CLIENT_SLUG,v); else localStorage.removeItem('gh_sha_'+CLIENT_SLUG); }

// ── Load from GitHub API (not CDN — always fresh, no 5min cache) ──
async function loadFromGitHub(){
  const token=getToken();
  if(!token){ console.log('No token — mode local'); migrateTabIds(); migratePins(); return; }
  try{
    const apiBase=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
    const headers={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};
    const r=await fetch(apiBase+'?ref='+GH_BRANCH,{headers});
    if(!r.ok){
      if(r.status===404){ console.log('menu.json absent — premier lancement'); return; }
      throw new Error('HTTP '+r.status);
    }
    const meta=await r.json();
    // Save SHA for next publish (avoids a redundant GET)
    if(meta.sha) saveSha(meta.sha);
    // Decode base64 content → JSON
    const raw=atob(meta.content.replace(/\n/g,''));
    const bytes=Uint8Array.from(raw,ch=>ch.charCodeAt(0));
    const jsonStr=new TextDecoder().decode(bytes);
    const json=JSON.parse(jsonStr);
    // Apply everything
    if(Array.isArray(json.tabs) && json.tabs.length>0){
      DATA.tabs=json.tabs;
      DATA.tabs[0].isHome=true;
    }
    if(json.hero && typeof json.hero==='object') DATA.hero=json.hero;
    if(typeof json.heroActive!=='undefined') DATA.heroActive=json.heroActive;
    if(json.intro && typeof json.intro==='object') DATA.intro=json.intro;
    if(Array.isArray(json.specials) && json.specials.length>0) DATA.specials=json.specials.filter(s=>s.id!=='midi'&&s.id!=='soir');
    if(Array.isArray(json.pinnedDishes)) DATA.pinnedDishes=json.pinnedDishes;
    if(json.social && typeof json.social==='object') DATA.social=json.social;
    if(json.homeTab && typeof json.homeTab==='object') DATA.homeTab=json.homeTab;
    if(json.infoBanner && typeof json.infoBanner==='object') DATA.infoBanner=json.infoBanner;
    if(typeof json.pinnedShowHome!=='undefined') DATA.pinnedShowHome=json.pinnedShowHome;
    if(typeof json.pinnedShowFirst!=='undefined') DATA.pinnedShowFirst=json.pinnedShowFirst;
    if(Array.isArray(json.schedule) && json.schedule.length>0) DATA.schedule=json.schedule;
    // BUG FIX: was being published but never restored on reload — the reason
    // "Adresse & contact" appeared to never save.
    if(json.address && typeof json.address==='object') DATA.address=json.address;
    if(typeof json.restaurantName==='string' && json.restaurantName) DATA.restaurantName=json.restaurantName;
    if(typeof json.restaurantLogo==='string') DATA.restaurantLogo=json.restaurantLogo;
    // BUG FIX: same missing-restore pattern as "Adresse & contact" above —
    // these were all published correctly but silently dropped on the next
    // load, so any change (brand colors, title font, header logo toggle,
    // decorative icons, social post templates) appeared to "not save" even
    // though it had actually published fine.
    if(json.brandColors && typeof json.brandColors==='object') DATA.brandColors=json.brandColors;
    if(typeof json.restoFont==='string' && json.restoFont) DATA.restoFont=json.restoFont;
    if(typeof json.showHeaderLogo!=='undefined') DATA.showHeaderLogo=json.showHeaderLogo;
    if(json.icones && typeof json.icones==='object') DATA.icones=json.icones;
    if(Array.isArray(json.corpoTemplates)) DATA.corpoTemplates=json.corpoTemplates;
    // Restore home tab if it was active
    if(DATA.homeTab&&DATA.homeTab.active){
      const hasHome=DATA.tabs.some(t=>t.id==='__home');
      if(!hasHome) DATA.tabs.unshift({id:'__home',label:{fr:'Accueil',en:'Home',es:'Inicio',it:'Casa',kr:'홈',jp:'ホーム'},cards:[]});
    }
    migrateTabIds();
    { const hashTid=tabIdFromHash();
      currentTabId=(hashTid && DATA.tabs.some(tb=>tb.id===hashTid && tb.visible!==false)) ? hashTid : (DATA.tabs[0]?.id||'huitres');
    }
    migratePins();
    console.log('✓ Chargé depuis GitHub API — tabs:'+DATA.tabs.length+', specials actifs:'+DATA.specials.filter(s=>s.active).length+', intro:'+DATA.intro.active);
  }catch(e){
    console.warn('GitHub load failed:', e.message);
    showToast('⚠️ Chargement depuis GitHub impossible : '+e.message+' — données locales affichées');
    migrateTabIds();
    migratePins();
  }
}

  logoPos: 'top',  // top | bottom
};

function renderSocialSection(){
  const s = socState;
  const bc = DATA.brandColors||{primary:'#10285E',accent:'#C6A24A',bg:'#F7F5F0'};
  const caption = buildCaption();

  // ─ Template presets basés sur les couleurs corpo ─
  const presets = [
    {label:'Primaire', bg:bc.primary, text:'#ffffff'},
    {label:'Accent',   bg:bc.accent,  text:'#ffffff'},
    {label:'Fond',     bg:bc.bg,      text:bc.primary},
  ];

  const isLibre = s.tplId==='libre';
  const isEvent = s.tplId==='event';
  const isPlat  = s.tplId==='plat';

  const section = (title, content) =>
    `<div class="soc-mini-section"><div class="soc-mini-title">${title}</div>${content}</div>`;

  // Dropdown type de post
  const typeDropdown = `<div class="af">
    <label class="al">Type de post</label>
    <select class="ai" onchange="socPickTpl(this.value)">
      ${SOCIAL_TEMPLATES.map(tp=>`<option value="${tp.id}"${s.tplId===tp.id?' selected':''}>${tp.label}</option>`).join('')}
    </select>
  </div>`;

  // Dropdown plat/boisson (only when not libre)
  const dishDropdown = isLibre ? '' : `<div class="af">
    <label class="al">Plat ou boisson (optionnel)</label>
    <select class="ai" onchange="socPickDish(this.value)">
      <option value="">— Saisie libre —</option>
      ${(()=>{let o='';DATA.tabs.filter(tb=>tb.visible!==false&&tb.id!=='__home').forEach(tb=>{(tb.cards||[]).forEach(card=>{(card.dishes||[]).filter(d=>!d.hidden&&t(d.name)).forEach(d=>{const p=encodeURIComponent(JSON.stringify({name:t(d.name),desc:t(d.desc)||'',img:d.img||'',caption:d.caption||'',gallery:d.gallery||[]}));o+=`<option value="${p}">${t(tb.label)} — ${t(d.name)}</option>`;});(card.items||[]).filter(i=>!i.hidden&&t(i.name)).forEach(i=>{const p=encodeURIComponent(JSON.stringify({name:t(i.name),desc:t(i.desc)||'',img:i.img||'',caption:i.caption||'',gallery:i.gallery||[]}));o+=`<option value="${p}">${t(tb.label)} — ${t(i.name)}</option>`;});});});return o;})()}
    </select>
  </div>`;

  // Gallery strip
  const galleryStrip = (()=>{
    const d=s.selectedDish;
    const gallery=d?[d.img,...(d.gallery||[])].filter(Boolean):[s.photo].filter(Boolean);
    if(!gallery.length) return '';
    return `<div class="af"><label class="al">Choisir la photo</label><div style="display:flex;gap:8px;flex-wrap:wrap">
      ${gallery.map((img,gi)=>`<div onclick="socState.galleryIdx=${gi};socState.photo='${img}';renderAdminSection('__social')" style="width:64px;height:64px;border-radius:8px;overflow:hidden;cursor:pointer;border:${s.galleryIdx===gi?'2.5px solid var(--gold)':'2px solid var(--border)'}"><img src="${img}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`).join('')}
    </div></div>`;
  })();

  // Photo upload (when no dish selected)
  const photoField = !s.selectedDish ? `<div class="af"><label class="al">Photo (URL ou upload)</label>
    <div class="ai-img-wrap"><input class="ai" value="${s.photo}" placeholder="https://..." oninput="socState.photo=this.value;renderSocPreview()">
    <label class="ai-upload-btn"><input type="file" accept="image/*" style="display:none" onchange="socLoadFile(this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path></svg></label></div>
  </div>` : '';

  // Corpo template presets
  const presetBtns = `<div class="af"><label class="al">Preset couleurs</label>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${presets.map((p,i)=>`<button onclick="socState.textColor='${p.text}';renderAdminSection('__social')" style="padding:8px 14px;border-radius:6px;font-size:11px;font-family:Jost,sans-serif;font-weight:600;cursor:pointer;border:2px solid ${p.bg};background:${p.bg};color:${p.text}">${p.label}</button>`).join('')}
    </div>
  </div>`;

  // SECTION 1: Contenu
  const s1 = section('Contenu', typeDropdown + dishDropdown + galleryStrip + photoField
    + `<div class="af"><label class="al">Titre</label><input class="ai" id="socTitreInput" value="${s.titre}" placeholder="Titre…" oninput="socState.titre=this.value;renderSocPreview()"></div>`
    + `<div class="af"><label class="al">Description</label><textarea class="ai" rows="4" style="resize:vertical;min-height:80px" oninput="socState.desc=this.value;renderSocPreview()">${s.desc}</textarea></div>`
    + (isEvent ? `<div class="af"><label class="al">Date & heure</label><input class="ai" value="${s.extra}" placeholder="Samedi 28 juin · 19h" oninput="socState.extra=this.value;renderSocPreview()"></div>` : '')
    + (isPlat  ? `<div class="af"><label class="al">Prix (optionnel)</label><input class="ai" value="${s.extra}" placeholder="26€" oninput="socState.extra=this.value;renderSocPreview()"></div>` : '')
    + (isLibre ? `<div class="af"><label class="al">Date (optionnel)</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input class="ai" value="${s.date||''}" placeholder="Samedi 28 juin" oninput="socState.date=this.value;renderSocPreview()" style="flex:1">
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;white-space:nowrap;cursor:pointer"><input type="checkbox" ${s.showDate?'checked':''} onchange="socState.showDate=this.checked;renderSocPreview()"> Afficher</label>
      </div></div>
      <div class="af"><label class="al">Logo</label>
      <div style="display:flex;gap:8px">
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" ${s.showLogo?'checked':''} onchange="socState.showLogo=this.checked;renderSocPreview()"> Afficher</label>
        <select class="ai" style="flex:1" onchange="socState.logoPos=this.value;renderSocPreview()">
          <option value="top" ${s.logoPos==='top'?'selected':''}>En haut</option>
          <option value="bottom" ${s.logoPos==='bottom'?'selected':''}>En bas</option>
        </select>
      </div></div>` : ''));

  // SECTION 2: Caractéristiques du texte
  const posGrid = ['top-left','top-center','top-right','center','bottom-left','bottom-center','bottom-right'];
  const posLabels = {'top-left':'↖','top-center':'↑','top-right':'↗','center':'·','bottom-left':'↙','bottom-center':'↓','bottom-right':'↘'};
  const s2 = section('Caractéristiques du texte',
    `<div class="af"><label class="al">Position</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:150px">
        ${posGrid.map((pos,i)=>{
          if(pos==='center') return `<div></div><button class="soc-pos-btn${s.textPos===pos?' active':''}" onclick="socState.textPos='${pos}';this.closest('.soc-pos-grid')?.querySelectorAll('.soc-pos-btn').forEach(b=>b.classList.toggle('active',b.dataset.pos==='${pos}'));renderSocPreview()" data-pos="${pos}">${posLabels[pos]}</button><div></div>`;
          return `<button class="soc-pos-btn${s.textPos===pos?' active':''}" onclick="socState.textPos='${pos}';renderAdminSection('__social')" data-pos="${pos}">${posLabels[pos]}</button>`;
        }).join('')}
      </div>
    </div>`
    + `<div class="af"><label class="al">Couleur du texte</label>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="color" value="${s.textColor}" oninput="socState.textColor=this.value;renderSocPreview()" style="width:38px;height:34px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer">
        <input class="ai" value="${s.textColor}" oninput="socState.textColor=this.value;renderSocPreview()" style="flex:1;font-family:monospace;font-size:12px">
      </div>
    </div>`
    + `<div class="af"><label class="al">Opacité fond sombre (${s.overlayOpacity}%)</label>
      <input type="range" min="0" max="80" value="${s.overlayOpacity}" oninput="socState.overlayOpacity=parseInt(this.value);this.previousElementSibling.textContent='Opacité fond sombre ('+this.value+'%)';renderSocPreview()" style="width:100%">
    </div>`
    + presetBtns);

  // SECTION 3: Typographie
  const s3 = section('Typographie',
    `<div class="af"><label class="al">Police</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${SOC_FONTS.map(f=>`<button class="soc-pos-btn${s.fontId===f.id?' active':''}" onclick="socState.fontId='${f.id}';renderAdminSection('__social')" style="padding:6px 10px;font-size:11px;font-family:${f.css}">${f.label}</button>`).join('')}
      </div>
    </div>`
    + `<div class="af"><label class="al">Taille titre</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="range" min="18" max="80" value="${s.titleSize}" oninput="socState.titleSize=parseInt(this.value);document.getElementById('socTitleSzLbl').textContent=this.value+'px';renderSocPreview()" style="flex:1">
        <span id="socTitleSzLbl" style="font-size:11px;color:var(--text3);width:34px">${s.titleSize}px</span>
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;white-space:nowrap"><input type="checkbox" ${s.titleBold?'checked':''} onchange="socState.titleBold=this.checked;renderSocPreview()"> Gras</label>
      </div>
    </div>`
    + `<div class="af"><label class="al">Taille description</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="range" min="10" max="40" value="${s.descSize}" oninput="socState.descSize=parseInt(this.value);document.getElementById('socDescSzLbl').textContent=this.value+'px';renderSocPreview()" style="flex:1">
        <span id="socDescSzLbl" style="font-size:11px;color:var(--text3);width:34px">${s.descSize}px</span>
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;white-space:nowrap"><input type="checkbox" ${s.descBold?'checked':''} onchange="socState.descBold=this.checked;renderSocPreview()"> Gras</label>
      </div>
    </div>`);

  // SECTION 4: Format + Export
  const s4 = section('Format',
    `<div style="display:flex;gap:8px">
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer"><input type="radio" name="socfmt" value="post" ${s.format==='post'?'checked':''} onchange="socState.format='post';renderSocPreview()"> Post (3:4)</label>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer"><input type="radio" name="socfmt" value="story" ${s.format==='story'?'checked':''} onchange="socState.format='story';renderSocPreview()"> Story (9:16)</label>
    </div>`);

  return `<div class="admin-section"><div class="admin-sect-title">Réseaux sociaux</div>
  <div class="admin-sect-body">
    <div class="soc-layout">
      <div class="soc-left">
        ${s1}${s2}${s3}${s4}
        <div class="soc-caption-box" style="margin-top:12px">
          <div class="soc-mini-title" style="margin-bottom:8px">Description Instagram</div>
          <textarea id="socCaptionEdit" rows="6" style="width:100%;resize:vertical;font-size:12px;font-family:'Open Sans',sans-serif;border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);background:#fff;min-height:120px">${s.caption||(caption||'')}</textarea>
          <button class="soc-copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('socCaptionEdit').value);showToast('Caption copiée !')">Copier la description</button>
        </div>
      </div>
      <div class="soc-canvas-wrap" style="flex:none">
        <div class="soc-canvas-label">Aperçu</div>
        <div class="soc-frame ratio-${s.format==='story'?'916':'34'}" id="socFrame">
          ${buildTplHTML(s.tplId, s.titre, s.desc, s.extra, s.photo, s.format, s.textPos, s.textColor, s.overlayOpacity, s)}
        </div>
        <div class="soc-dl-row">
          <button class="soc-dl-btn post" onclick="downloadSocImg('post')">⬇ Post 3:4</button>
          <button class="soc-dl-btn story" onclick="downloadSocImg('story')">⬇ Story 9:16</button>
        </div>
      </div>
    </div>
  </div></div>`;
}


function tplPlaceholder(id, field){
  const map = {
    arrivage: { titre:'Arrivage du jour', desc:'Fraîches, iodées, directement du Morbihan…' },
    plat:     { titre:'Huîtres Spéciales N°2', desc:'Élevées 4 ans en eau claire, goût de noisette…' },
    event:    { titre:'DJ Set · Nuit Bretonne', desc:"Venez découvrir notre sélection d'huîtres en musique…" },
    info:     { titre:'Fermeture exceptionnelle', desc:'Nous serons fermés le 14 juillet. À très vite !' },
  };
  return map[id]?.[field] || '';
}

function buildTplHTML(id, titre, desc, extra, photo, format, textPos, textColor, overlayOpacity, opts){
  const isStory = format === 'story';
  textPos = textPos || 'bottom-left';
  textColor = textColor || '#ffffff';
  overlayOpacity = overlayOpacity != null ? overlayOpacity : 40;
  opts = opts || {};
  const fontId = opts.fontId || 'opensans';
  const fontDef = SOC_FONTS.find(f=>f.id===fontId)||SOC_FONTS[0];
  const fontCss = fontDef.css;
  // Sizes in em relative to 16px base; frame is ~300px preview so scale down
  const titleSz = ((opts.titleSize||36)/16).toFixed(2) + 'em';
  const descSz  = ((opts.descSize||18)/16).toFixed(2) + 'em';
  const titleW  = opts.titleBold!==false ? '700' : '400';
  const descW   = opts.descBold ? '700' : '400';
  const showBadge    = opts.showBadge !== false;
  const showLogo     = opts.showLogo !== false;
  const showHashtags = opts.showHashtags !== false;
  // Text position → CSS
  const posMap = {
    'top-left':     'top:0;left:0;align-items:flex-start;justify-content:flex-start;text-align:left',
    'top-center':   'top:0;left:0;right:0;align-items:flex-start;justify-content:center;text-align:center',
    'top-right':    'top:0;right:0;align-items:flex-start;justify-content:flex-end;text-align:right',
    'center':       'top:0;left:0;right:0;bottom:0;align-items:center;justify-content:center;text-align:center',
    'bottom-left':  'bottom:0;left:0;align-items:flex-end;justify-content:flex-start;text-align:left',
    'bottom-center':'bottom:0;left:0;right:0;align-items:flex-end;justify-content:center;text-align:center',
    'bottom-right': 'bottom:0;right:0;align-items:flex-end;justify-content:flex-end;text-align:right',
  };
  const posCSS = posMap[textPos] || posMap['bottom-left'];
  // Gradient overlay based on position
  const isTop = textPos.startsWith('top');
  const isBot = textPos.startsWith('bottom');
  const gradDir = isTop ? 'to bottom' : isBot ? 'to top' : 'to top';
  const overlayCSS = overlayOpacity > 0
    ? `linear-gradient(${gradDir}, rgba(0,0,0,${overlayOpacity/100}) 0%, rgba(0,0,0,0) 60%)`
    : 'none';
  const restName = getRestaurantName() || 'Mon Restaurant';
  const logoUrl = getRestaurantLogo() || '';
  const hs = getScheduleSummary();
  const fs = isStory ? '1.4' : '1'; // scale factor for story

  if(id === 'arrivage'){
    return `<div class="st-wrap st-bg-navy" style="padding:${isStory?'8%':'6%'};justify-content:space-between">
      <div style="display:flex;justify-content:center;padding-bottom:${isStory?'6%':'4%'}">
        <img class="st-logo" src="${logoUrl}" style="max-height:${isStory?'48px':'36px'}" onerror="this.style.display='none'">
      </div>
      ${photo?`<div style="position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;width:100%;max-height:${isStory?'45%':'50%'}"><img src="${photo}" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,43,77,.6),transparent)"></div></div>`:'<div style="flex:1;background:rgba(255,255,255,.06);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:3em;opacity:.4">🦪</div>'}
      <div style="padding-top:${isStory?'6%':'4%'}">
        <div class="st-badge" style="font-size:${isStory?'.65em':'.55em'};padding:3px 10px;border-radius:4px;margin-bottom:8px">ARRIVAGE DU JOUR</div>
        <div class="st-divider" style="margin-bottom:10px"></div>
        <div class="st-title st-gold" style="font-size:${isStory?'1.8em':'1.5em'};margin-bottom:8px">${titre||'Nos Huîtres du Jour'}</div>
        <div class="st-sub" style="font-size:${isStory?'.75em':'.65em'};margin-bottom:12px">${desc||'Fraîches · Directement du Morbihan'}</div>
        <div class="st-hashtags" style="font-size:${isStory?'.6em':'.52em'}">#huitres #paris #morbihan #${restName.toLowerCase().replace(/[^a-z]/g,'')}</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:${isStory?'4%':'3%'};border-top:1px solid rgba(255,255,255,.15);margin-top:${isStory?'4%':'3%'}">
        <div style="font-size:${isStory?'.6em':'.52em'};color:rgba(255,255,255,.5);font-family:'Open Sans',sans-serif">${hs}</div>
      </div>
    </div>`;
  }

  if(id === 'plat'){
    return `<div class="st-wrap st-bg-dark" style="position:relative;justify-content:flex-end">
      ${photo?`<img class="st-photo" src="${photo}">
        <div style="position:absolute;inset:0;background:${overlayCSS};pointer-events:none"></div>`
        :'<div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(198,162,74,.15),transparent 70%)"></div>'}
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:${isStory?'8%':'6%'}">
        <div style="display:flex;justify-content:flex-end">
          ${showLogo?`<img class="st-logo-sm" src="${logoUrl}" style="max-height:${isStory?'28px':'22px'}" onerror="this.style.display='none'">`:''}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;justify-content:${textPos.startsWith('top')?'flex-start':textPos==='center'?'center':'flex-end'};align-items:${textPos.endsWith('right')?'flex-end':textPos.endsWith('center')||textPos==='center'?'center':'flex-start'}">
          <div>
            ${showBadge?`<div class="st-badge" style="font-size:${isStory?'.6em':'.52em'};padding:2px 8px;border-radius:3px;margin-bottom:10px">À LA CARTE</div>`:''}
            ${titre?`<div style="font-family:${fontCss};font-size:${isStory?'2em':'1.6em'};font-weight:${titleW};color:${textColor};margin-bottom:8px;line-height:1.1">${titre}</div>`:''}
            ${desc?`<div style="font-family:${fontCss};font-size:${isStory?'.75em':'.65em'};font-weight:${descW};color:${textColor};opacity:.88;margin-bottom:${extra?'12px':'0'}">${desc}</div>`:''}
            ${extra?`<div style="font-family:'Cormorant Garamond',serif;font-size:${isStory?'2em':'1.6em'};font-weight:700;color:var(--gold);margin-bottom:8px">${extra}</div>`:''}
            ${showHashtags?`<div class="st-divider" style="margin-bottom:8px"></div><div class="st-hashtags" style="font-size:${isStory?'.6em':'.52em'}">#huitres #finedeclaire #paris #morbihan</div>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }

  if(id === 'libre'){
    const jContent=`${textPos.startsWith('top')?'flex-start':textPos==='center'?'center':'flex-end'}`;
    const aContent=`${textPos.endsWith('right')?'flex-end':textPos.endsWith('center')||textPos==='center'?'center':'flex-start'}`;
    return `<div class="st-wrap" style="position:relative;background:#111;justify-content:flex-end">
      ${photo?`<img class="st-photo" src="${photo}"><div style="position:absolute;inset:0;background:${overlayCSS};pointer-events:none"></div>`:''}
      ${showLogo?`<div style="position:absolute;top:${isStory?'6%':'5%'};right:${isStory?'6%':'5%'}"><img src="${logoUrl}" style="max-height:${isStory?'28px':'22px'};object-fit:contain" onerror="this.style.display='none'"></div>`:''}
      <div style="position:absolute;inset:0;padding:${isStory?'8%':'6%'};display:flex;flex-direction:column;justify-content:${jContent};align-items:${aContent}">
        ${titre?`<div style="font-family:${fontCss};font-weight:${titleW};font-size:${isStory?'2.2em':'1.8em'};color:${textColor};line-height:1.1;margin-bottom:10px">${titre}</div>`:''}
        ${desc?`<div style="font-family:${fontCss};font-weight:${descW};font-size:${isStory?'.9em':'.75em'};color:${textColor};opacity:.88;line-height:1.4">${desc}</div>`:''}
      </div>
    </div>`;
  }

  if(id === 'event'){
    return `<div class="st-wrap st-bg-red" style="padding:${isStory?'8%':'6%'};justify-content:space-between;align-items:center;text-align:center">
      <div>
        <img class="st-logo" src="${logoUrl}" style="max-height:${isStory?'44px':'32px'};margin:0 auto" onerror="this.style.display='none'">
      </div>
      <div>
        <div style="font-family:'Open Sans',sans-serif;font-size:${isStory?'.65em':'.55em'};letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:12px">ÉVÉNEMENT</div>
        <div class="st-title" style="font-size:${isStory?'2em':'1.7em'};margin-bottom:16px">${titre||'Soirée Spéciale'}</div>
        ${extra?`<div class="st-badge" style="font-size:${isStory?'.75em':'.65em'};padding:6px 16px;border-radius:20px;margin-bottom:14px">${extra}</div>`:''}
        <div class="st-divider" style="margin:0 auto 14px"></div>
        <div class="st-sub" style="font-size:${isStory?'.75em':'.65em'}">${desc||'Une soirée unique au cœur de Paris'}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:${isStory?'.6em':'.52em'};color:rgba(255,255,255,.6);font-family:'Open Sans',sans-serif;margin-bottom:4px">${restName}</div>
        <div class="st-hashtags" style="font-size:${isStory?'.58em':'.5em'}">#monrestaurant</div>
      </div>
    </div>`;
  }

  // info / fermeture
  return `<div class="st-wrap st-bg-navy" style="padding:${isStory?'8%':'6%'};justify-content:center;align-items:center;text-align:center">
    <div>
      <img class="st-logo" src="${logoUrl}" style="max-height:${isStory?'52px':'40px'};margin:0 auto ${isStory?'10%':'8%'}" onerror="this.style.display='none'">
      <div class="st-divider" style="margin:0 auto ${isStory?'8%':'6%'}"></div>
      <div class="st-title" style="font-size:${isStory?'1.7em':'1.4em'};margin-bottom:${isStory?'6%':'5%'}">${titre||'Information importante'}</div>
      <div class="st-sub" style="font-size:${isStory?'.8em':'.68em'};margin-bottom:${isStory?'8%':'6%'}">${desc||'Nous vous informons de...'}</div>
      <div class="st-divider" style="margin:0 auto ${isStory?'6%':'5%'}"></div>
      <div style="font-size:${isStory?'.62em':'.54em'};color:rgba(255,255,255,.5);font-family:'Open Sans',sans-serif;line-height:1.6">${hs}<br>${restName}</div>

  </div>`;
}

function getScheduleSummary(){
  const sch = DATA.schedule||[];
  const open = sch.filter(d=>(d.services||[]).length>0||(d.open!=null));
  if(!open.length) return '';
  const names = open.map(d=>d.day.substring(0,3)).join(' · ');
  const firstSvc = (open[0].services||[])[0] || open[0];
  if(!firstSvc||firstSvc.open==null) return '';
  return `${names} · ${firstSvc.open}h – ${firstSvc.close>12?firstSvc.close-24||firstSvc.close:firstSvc.close}h`;
}

function buildCaption(){
  const s = socState;
  const restName = getRestaurantName() || 'Mon Restaurant';
  const hs = getScheduleSummary();

  if(!s.titre && !s.desc) return '← Remplissez le titre et la description pour générer la caption.';

  if(s.tplId === 'arrivage'){
    return `🦪 ${s.titre||'Arrivage du jour'}

${s.desc||''}

Fraîches, iodées, directement de nos parcs en Morbihan. Élevées à la main, livrées à Paris le jour même.

${hashtags}`;

    return `✨ ${s.titre||'À la carte'}${s.extra?' — '+s.extra:''}

${s.desc||''}

Découvrez notre sélection d'huîtres et fruits de mer, directement de nos producteurs bretons.

📍 ${restName} · Paris

function socPickDish(val){
  if(!val){ socState.selectedDish=null; renderAdminSection('__social'); return; }
  try {
    const d = JSON.parse(decodeURIComponent(val));
    socState.selectedDish = d;
    socState.titre = d.name || '';
    socState.desc = d.desc || '';
    socState.caption = d.caption || '';
    // Use first gallery image if available, else main img
    const gallery = d.gallery ? d.gallery.filter(Boolean) : [];
    socState.photo = gallery[0] || d.img || '';
    socState.galleryIdx = 0;
    renderAdminSection('__social');
  } catch(e){}
}

function socPickTpl(id){
  socState.tplId = id;
  socState.extra = '';
  renderAdminSection('__social');
}

function socLoadFile(input){
  if(!input.files||!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => { socState.photo = e.target.result; renderSocPreview(); };
  reader.readAsDataURL(input.files[0]);
}

function renderSocPreview(){
  const frame = document.getElementById('socFrame');
  const cap   = document.getElementById('socCaption');
  if(frame){
    frame.className = 'soc-frame ratio-'+(socState.format==='story'?'916':'34');
    frame.innerHTML = buildTplHTML(socState.tplId, socState.titre, socState.desc, socState.extra, socState.photo, socState.format, socState.textPos, socState.textColor, socState.overlayOpacity, socState);
  }
  if(cap) cap.textContent = buildCaption();
}

function downloadSocImg(fmt){
  const s = socState;
  const prevFmt = s.format;
  s.format = fmt;

  const size = fmt==='story' ? {w:1080,h:1920} : {w:1080,h:1350};

  // Render at preview size (matches the visible frame) then scale up
  // Preview frame is ~800px wide max, we render at that width and scale to 1080
  const renderW = fmt==='story' ? 405 : 400; // 9:16 → 405×720, 1:1 → 400×400
  const renderH = fmt==='story' ? 720 : 400;
  const scaleF  = size.w / renderW; // ~2.7x → produces 1080px output

  const div = document.createElement('div');
  div.style.cssText = `position:fixed;left:-9999px;top:0;width:${renderW}px;height:${renderH}px;overflow:hidden;z-index:-1;font-size:16px`;
  div.innerHTML = buildTplHTML(s.tplId, s.titre, s.desc, s.extra, s.photo, fmt, s.textPos, s.textColor, s.overlayOpacity, s);
  document.body.appendChild(div);

  if(typeof html2canvas !== 'undefined'){
    showToast('Export en cours…');
    // Pre-load images as blob to bypass CORS, then render
    async function loadImgAsBlob(url){
      try {
        const r=await fetch(url,{mode:'cors'}); const b=await r.blob();
        return URL.createObjectURL(b);
      } catch(e){ return url; }
    }
    const imgEl=div.querySelector('img[src]:not([src=""])');
    const imgSrc=imgEl?.src||'';
    (imgSrc ? loadImgAsBlob(imgSrc) : Promise.resolve('')).then(blobUrl=>{
      if(blobUrl&&imgEl) imgEl.src=blobUrl;
      return html2canvas(div, {
        width: renderW,
        height: renderH,
        scale: scaleF,
        useCORS: true,
        allowTaint: true,
        logging: false,
        onclone: (cloneDoc)=>{
          // ensure fonts are loaded in clone
          const s=cloneDoc.createElement('link');
          s.href='https://fonts.googleapis.com/css2?family=Open+Sans+Condensed:wght@300;700&family=Playfair+Display:ital,wght@0,400;0,700&family=Jost:wght@400;700&display=swap';
          s.rel='stylesheet'; cloneDoc.head.appendChild(s);
        }
      });
    }).then(canvas=>{
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `drevici-${s.tplId}-${fmt}.png`;
      a.click();
      document.body.removeChild(div);
      s.format = prevFmt;
      showToast('✓ Image exportée !');
    }).catch((e)=>{ console.error(e); document.body.removeChild(div); s.format=prevFmt; showToast('Erreur export — vérifiez les images CORS'); });
  } else {
    document.body.removeChild(div);
    s.format = prevFmt;
    showToast('⚠ html2canvas non chargé');
  }
}

function exportTabCSV(tabId){
  const tab = tabId === '__all'
    ? null
    : DATA.tabs.find(tb => tb.id === tabId);
  const tabs = tab ? [tab] : DATA.tabs;
  const rows = [['Onglet','Carte','Nom','Description','Prix','Informations alimentaires']];
  tabs.forEach(tb => {
    tb.cards.forEach(card => {
      const cardLabel = t(card.label) || '';
      const tabLabel  = t(tb.label)  || '';
      if(card.dishes){
        card.dishes.forEach(d => {
          rows.push([
            tabLabel, cardLabel,
            t(d.name)||'', t(d.desc)||'', d.price||'',
            badgeLabels(d).join(', ')
          ]);
        });
      } else if(card.type==='variants'){
        (card.variants||[]).forEach(v => {
          rows.push([tabLabel, cardLabel, t(v.name)||'', '', v.price||'','']);
        });
      } else if(card.type==='bevs'){
        (card.items||[]).forEach(item => {
          const sizes = (item.sizes||[]).map(s=>s.cl+(s.unit==='l'?'L':'cl')+' '+s.price+'€').join(' / ');
          rows.push([tabLabel, cardLabel, t(item.name)||'', t(item.desc)||'', sizes||item.price||'', '']);
        });
      }
    });
  });
  const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const bom  = '﻿';
  const blob = new Blob([bom+csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const name = tab ? t(tab.label).toLowerCase().replace(/\s+/g,'-') : 'menu-complet';
  a.href=url; a.download='menu-'+name+'.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exporté — '+rows.length+' lignes');
}

// Build the inner menu HTML (shared by preview + export)
function buildPdfMenuHTML(cfg){
  const restName = getRestaurantName() || 'Menu';
  // Logo: PDF-specific upload > restaurant logo already stored > nothing
  const logoUrl = (DATA.pdfStyle && DATA.pdfStyle.logoData) || getRestaurantLogo() || '';
  let h = '';

  // Header
  const icData = DATA.icones||{};
  const showMainIc = cfg.showIcons!==false && icData.main && !cfg.showLogo;
  const showSecIc  = cfg.showIcons!==false && !!icData.secondary;
  h += `<div class="pdf-header">`;
  if(cfg.showLogo && logoUrl) h += `<img src="${logoUrl}" class="pdf-logo" onerror="this.style.display='none'">`;
  else if(cfg.showLogo && !logoUrl) h += `<div class="pdf-logo-text">${getRestaurantName()||''}</div>`;
  h += `<h1 class="pdf-title">${restName}</h1>`;
  if(DATA.heroActive && DATA.hero) h += `<div class="pdf-sub">${t(DATA.hero)}</div>`;
  if(showMainIc) h += `<img src="${icData.main}" style="width:48px;height:48px;object-fit:contain;margin:10px auto 0;display:block" onerror="this.style.display='none'">`;
  if(cfg.template === 'maritime') h += `<div class="pdf-deco-divider">${PDF_SVG.waves}</div>`;
  h += `</div>`;

  // Tabs / sections
  DATA.tabs.filter(tb=>tb.id!=='__home' && tb.visible!==false).forEach(tb=>{
    h += `<div class="pdf-section">`;
    h += `<h2 class="pdf-cat">`;
    if(showSecIc) h += `<img src="${icData.secondary}" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;margin-right:6px" onerror="this.remove()">`;
    else if(cfg.template === 'maritime') h += `<span class="pdf-cat-icon">${PDF_SVG.oyster}</span>`;
    h += `${t(tb.label)}</h2>`;
    tb.cards.forEach(card=>{
      if(t(card.label) && tb.cards.length>1) h += `<h3 class="pdf-subcat">${t(card.label)}</h3>`;
      const rows = [];
      if(card.dishes){
        card.dishes.forEach(d=>{
          rows.push(`<div class="pdf-dish"><div class="pdf-dish-line"><span class="pdf-dish-name">${t(d.name)||''}</span><span class="pdf-dots"></span><span class="pdf-dish-price">${d.price||''}</span></div>${t(d.desc)?`<div class="pdf-dish-desc">${t(d.desc)}</div>`:''}</div>`);
        });
      } else if(card.type==='variants'){
        (card.variants||[]).forEach(v=>{
          rows.push(`<div class="pdf-dish"><div class="pdf-dish-line"><span class="pdf-dish-name">${t(v.name)||''}</span><span class="pdf-dots"></span><span class="pdf-dish-price">${v.price||''}</span></div></div>`);
        });
      } else if(card.type==='bevs'){
        (card.items||[]).forEach(item=>{
          const sizes=(item.sizes||[]).map(s=>s.cl+(s.unit==='l'?'L':'cl')+' — '+s.price+'€').join(' · ');
          rows.push(`<div class="pdf-dish"><div class="pdf-dish-line"><span class="pdf-dish-name">${t(item.name)||''}</span><span class="pdf-dots"></span><span class="pdf-dish-price">${sizes||item.price||''}</span></div>${t(item.desc)?`<div class="pdf-dish-desc">${t(item.desc)}</div>`:''}</div>`);
        });
      }
      h += rows.join('');
    });
    h += `</div>`;
  });

  // Footer
  const footerBits = [];
  if(cfg.footerAddress) footerBits.push(cfg.footerAddress);
  if(cfg.footerPhone) footerBits.push(cfg.footerPhone);
  if(cfg.footerShowDate){
    const now = new Date();
    footerBits.push('Mis à jour le ' + now.toLocaleDateString('fr-FR'));
  }
  if(footerBits.length || cfg.template==='maritime'){
    h += `<div class="pdf-footer">`;
    if(cfg.template === 'maritime') h += `<div class="pdf-deco-anchor">${PDF_SVG.anchor}</div>`;
    if(footerBits.length) h += `<div class="pdf-footer-text">${footerBits.join('  ·  ')}</div>`;
    h += `</div>`;
  }
  return h;
}

// CSS for a given config + format
function buildPdfCSS(cfg){
  const isGbiz = cfg.format === 'gbiz';
  // A4 ~ 794px wide @96dpi; Google Business 3064x5447 → we render preview at scaled width
  const pageW = isGbiz ? 612 : 700;   // preview px width (gbiz is portrait 9:16-ish)
  const pad = isGbiz ? 70 : 40;
  const maritime = cfg.template === 'maritime';
  return `
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  .pdf-page{font-family:'Open Sans',sans-serif;color:#1a1a1a;background:${cfg.bgColor||'#FFFDF8'};width:${pageW}px;padding:${pad}px;margin:0 auto;position:relative}
  ${maritime?`.pdf-page::before{content:'';position:absolute;inset:14px;border:1.5px solid ${cfg.accentColor};opacity:.4;pointer-events:none}`:''}
  .pdf-header{text-align:center;margin-bottom:${isGbiz?40:28}px;position:relative}
  .pdf-logo-text{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--navy,#10285E);margin:0 auto 12px;display:block;text-align:center}
.pdf-logo{max-width:${isGbiz?160:120}px;max-height:${isGbiz?110:80}px;object-fit:contain;margin:0 auto 12px;display:block}
  .pdf-title{font-family:'Cormorant Garamond',serif;font-size:${isGbiz?44:32}px;font-weight:700;color:${cfg.titleColor};line-height:1.1}
  .pdf-sub{font-size:${isGbiz?13:11}px;letter-spacing:.16em;text-transform:uppercase;color:#999;margin-top:6px}
  .pdf-deco-divider{width:${isGbiz?120:90}px;margin:14px auto 0;color:${cfg.accentColor}}
  .pdf-deco-divider svg{width:100%;height:auto;display:block}
  .pdf-section{margin-bottom:${isGbiz?30:22}px;break-inside:avoid;page-break-inside:avoid}
  .pdf-cat{font-family:'Cormorant Garamond',serif;font-size:${isGbiz?26:20}px;font-weight:600;color:${cfg.titleColor};margin:${isGbiz?28:20}px 0 ${isGbiz?16:12}px;padding-bottom:6px;border-bottom:1.5px solid ${maritime?cfg.accentColor:'#e2e2e2'};display:flex;align-items:center;gap:10px}
  .pdf-cat-icon{display:inline-block;width:${isGbiz?28:22}px;height:${isGbiz?28:22}px;color:${cfg.accentColor};flex:none}
  .pdf-cat-icon svg{width:100%;height:100%;display:block}
  .pdf-subcat{font-size:${isGbiz?13:11}px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:${cfg.accentColor};margin:${isGbiz?18:14}px 0 ${isGbiz?10:8}px}
  .pdf-dish{margin-bottom:${isGbiz?13:10}px;break-inside:avoid;page-break-inside:avoid}
  .pdf-dish-line{display:flex;align-items:baseline;gap:6px}
  .pdf-dish-name{font-size:${isGbiz?16:13}px;font-weight:600;white-space:nowrap}
  .pdf-dots{flex:1;border-bottom:1px dotted #ccc;transform:translateY(-3px);min-width:18px}
  .pdf-dish-price{font-size:${isGbiz?16:13}px;font-weight:600;color:${cfg.accentColor};white-space:nowrap;flex:none}
  .pdf-dish-desc{font-size:${isGbiz?12:10.5}px;font-weight:300;color:#777;margin-top:2px;line-height:1.4;max-width:88%}
  .pdf-footer{margin-top:${isGbiz?44:30}px;padding-top:${isGbiz?20:14}px;border-top:1px solid ${maritime?cfg.accentColor:'#e2e2e2'};text-align:center}
  .pdf-deco-anchor{width:${isGbiz?40:30}px;margin:0 auto ${isGbiz?12:8}px;color:${cfg.accentColor}}
  .pdf-deco-anchor svg{width:100%;height:auto;display:block}
  .pdf-footer-text{font-size:${isGbiz?12:10}px;color:#999;letter-spacing:.04em;line-height:1.6}
  @media print{
    @page{size:A4;margin:14mm}
    body{background:#fff!important}
    .pdf-page{width:100%!important;padding:0!important;margin:0!important}
    .pdf-page::before{display:none!important}
  }`;
}

// Live preview into the admin iframe
function updatePdfPreview(){
  const frame = document.getElementById('pdfPreviewFrame');
  if(!frame) return;
  const cfg = pdfCfg();
  const css = buildPdfCSS(cfg);
  const menu = buildPdfMenuHTML(cfg);
  const isGbiz = cfg.format === 'gbiz';
  // For A4: overlay page-break guides every ~1040px (A4 ratio at 700px width)
  const doc = `<!DOCTYPE html><html><head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans+Condensed:wght@300;700&family=Lovelo:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"><meta charset="UTF-8"><style>${css}
    body{background:#e8e8e8;padding:16px 0;margin:0}
    .pdf-page{box-shadow:0 2px 12px rgba(0,0,0,.15)}
    ${!isGbiz?`.pdf-page{position:relative}`:''}
  </style></head><body><div class="pdf-page" id="pdfPageEl">${menu}</div>
  <script>
    // Draw page-break guide lines for A4 so user sees where pages cut
    (function(){
      var isGbiz=${isGbiz};
      if(isGbiz) return;
      var page=document.getElementById('pdfPageEl');
      var w=page.offsetWidth;
      var pageH=Math.round(w*297/210); // A4 ratio
      var total=page.offsetHeight;
      var n=Math.floor(total/pageH);
      for(var i=1;i<=n;i++){
        var line=document.createElement('div');
        line.style.cssText='position:absolute;left:0;right:0;top:'+(i*pageH)+'px;border-top:2px dashed #d33;z-index:99;pointer-events:none';
        var lbl=document.createElement('div');
        lbl.textContent='— coupure page '+(i+1)+' —';
        lbl.style.cssText='position:absolute;right:6px;top:'+(i*pageH+2)+'px;font:10px sans-serif;color:#d33;background:#fff;padding:1px 5px;z-index:100';
        page.appendChild(line);page.appendChild(lbl);
      }
    })();
  <\/script>
  </body></html>`;
  frame.srcdoc = doc;
}

function exportGbizImage(cfg){
  if(typeof html2canvas === 'undefined'){ showToast('⚠ html2canvas non chargé'); return; }
  showToast('Génération image en cours…');
  // Render off-screen at preview width, then scale to 3064px wide
  const css = buildPdfCSS(cfg);
  const menu = buildPdfMenuHTML(cfg);
  const holder = document.createElement('div');
  holder.style.cssText = 'position:fixed;left:-99999px;top:0;';
  holder.innerHTML = `<style>${css}</style><div class="pdf-page" id="gbizPage">${menu}</div>`;
  document.body.appendChild(holder);
  const pageEl = holder.querySelector('#gbizPage');
  const previewW = pageEl.offsetWidth || 612;
  const TARGET_W = 3064;
  const scale = TARGET_W / previewW;
  setTimeout(()=>{
    html2canvas(pageEl, { scale: scale, useCORS: true, backgroundColor: cfg.template==='maritime'?'#fdfbf6':'#ffffff', logging:false })
      .then(canvas => {
        document.body.removeChild(holder);
        const link = document.createElement('a');
        link.download = (getRestaurantName()||'menu').replace(/\s+/g,'-').toLowerCase() + '-google-business.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('✓ Image Google Business téléchargée');
      })
      .catch(err => {
        document.body.removeChild(holder);
        console.error(err);
        showToast('⚠ Erreur génération image');
      });
  }, 400);
}

async function publishToGitHub(){
  const token=getToken();
  if(!token){ showToast('⚠️ Token GitHub manquant'); renderAdminSection('__global'); return; }
  const btn=document.getElementById('ghPublishBtn');
  if(btn){ btn.textContent='⏳ Publication…'; btn.disabled=true; }
  try{
    const apiBase=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
    const headers={'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};

    // Always get a fresh SHA from the API (never use stale cache)
    let sha=null;
    const getR=await fetch(apiBase+'?ref='+GH_BRANCH+'&t='+Date.now(),{headers,cache:'no-store'});
    if(getR.ok){ const meta=await getR.json(); sha=meta.sha||null; saveSha(sha); }
    else if(getR.status!==404){ throw new Error('Erreur SHA: HTTP '+getR.status); }

    // Deep-clone DATA, serialize to JSON, encode to base64 (Unicode-safe)
    const clean=JSON.parse(JSON.stringify(DATA));
    const jsonStr=JSON.stringify(clean,null,2);
    const bytes=new TextEncoder().encode(jsonStr);
    // Safety check: a menu.json bloated with embedded base64 photos can silently
    // fail (or time out) against the GitHub Contents API. Surface this clearly
    // instead of a cryptic network/HTTP error.
    const MAX_PAYLOAD_MB = 20;
    if(bytes.length > MAX_PAYLOAD_MB*1024*1024){
      throw new Error('menu.json trop volumineux ('+(bytes.length/1024/1024).toFixed(1)+' Mo) — remplacez certaines photos par des URLs externes au lieu d\'uploads pour réduire la taille');
    }
    let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
    const content=btoa(bin);

    const body={message:'Menu update — '+new Date().toLocaleString('fr-FR'),content,branch:GH_BRANCH};
    if(sha) body.sha=sha;

    const putR=await fetch(apiBase,{method:'PUT',headers,body:JSON.stringify(body),cache:'no-store'});
    if(!putR.ok){
      const err=await putR.json();
      // SHA conflict → retry with fresh SHA
      if(putR.status===409||putR.status===422){
        showToast('⏳ Conflit SHA, nouvelle tentative…');
        setTimeout(publishToGitHub,1000);
        return;
      }
      throw new Error(err.message||'HTTP '+putR.status);
    }
    const putData=await putR.json();
    // Store the new SHA immediately so next publish doesn't need a GET
    if(putData?.content?.sha) saveSha(putData.content.sha);
    showToast('✅ Publié ! En ligne dans ~30s');
  }catch(e){
    console.error('Publish error:',e);
    showToast('❌ '+e.message);
    if(e.message.includes('401')||e.message.toLowerCase().includes('credential')){ saveToken(''); renderAdminSection('__global'); }
  }finally{
    if(btn){ btn.textContent='🚀 Publier sur GitHub'; btn.disabled=false; }
  }
}

// BUG FIX: these keys used to be global ('restaurant_name'/'restaurant_logo'),
// which meant every client site hosted under the same GitHub Pages domain
// shared the exact same browser storage — whichever name was typed last (on
// ANY client's admin panel) leaked into every other client's site in that
// browser. Namespacing by CLIENT_SLUG isolates each deployment, matching how
// gh_sha_ already worked correctly.
// DATA.restaurantName/restaurantLogo are the authoritative, published values
// (synced to GitHub like every other setting). The namespaced localStorage
// key is only consulted as a one-time fallback, in case a name was typed
// under the previous (browser-only) scheme before this fix.
function getRestaurantName(){ return DATA.restaurantName || localStorage.getItem('restaurant_name_'+CLIENT_SLUG) || 'Mon Restaurant'; }
function getRestaurantLogo(){ return DATA.restaurantLogo || localStorage.getItem('restaurant_logo_'+CLIENT_SLUG) || ''; }
function setRestaurantName(v){ DATA.restaurantName=v; applyRestaurantBranding(); }
function setRestaurantLogo(v){ DATA.restaurantLogo=v; applyRestaurantBranding(); }
function applyRestaurantBranding(){
  applyBrandColors();
  // BUG FIX: setRestoFont() only ever set this CSS var live, in-session,
  // when the admin dropdown fired onchange. Nothing re-applied it from
  // DATA.restoFont on a fresh load, so the font change appeared to "work"
  // only in that same browser tab and was lost on any other device/reload
  // even though DATA.restoFont was saved correctly. Re-apply it here since
  // this runs on every renderAll() and at init.
  if(DATA.restoFont) document.documentElement.style.setProperty('--restoFont', "'"+DATA.restoFont+"'");
  const name=getRestaurantName();
  const logo=getRestaurantLogo();
  const logoEl=document.querySelector('.logo-img');
  const textEl=document.getElementById('logoText');
  const showHdrLogo = DATA.showHeaderLogo !== false;
  if(logo&&logoEl&&showHdrLogo){ logoEl.src=logo; logoEl.style.display='block'; if(textEl) textEl.style.display='none'; }
  else { if(logoEl) logoEl.style.display='none'; if(textEl){ textEl.style.display='block'; textEl.textContent=name||'Mon Restaurant'; } }
  document.title=(name||'Menu')+' — Menu';
}

function applyBrandColors(){
  const bc=DATA.brandColors||{};
  const root=document.documentElement;
  if(bc.primary) root.style.setProperty('--navy',bc.primary);
  if(bc.accent)  root.style.setProperty('--gold',bc.accent);
  if(bc.bg)      root.style.setProperty('--bg',bc.bg);
  if(bc.subtitle)    root.style.setProperty('--subtitleColor',bc.subtitle);
  if(bc.tabInactive) root.style.setProperty('--tabInactiveColor',bc.tabInactive);
  // Keep the browser/status-bar tint (iOS/Android) in sync with the header
  // color so it never falls back to showing --bg above the header. Read
  // the resolved --navy value (not just bc.primary) so this also self-heals
  // if --navy was set some other way.
  const themeMeta=document.getElementById('themeColorMeta');
  if(themeMeta){
    const primary=bc.primary||getComputedStyle(root).getPropertyValue('--navy').trim();
    if(primary) themeMeta.setAttribute('content',primary);
  }
}

function resetBrandColors(){
  DATA.brandColors={primary:'#10285E',accent:'#C6A24A',bg:'#F7F5F0',subtitle:'#E6E6E6',tabInactive:'#B3B3B3'};
  applyBrandColors();
  renderAdminSection(adminCurrentTab);
}

function setRestoFont(font){
  DATA.restoFont = font;
  document.documentElement.style.setProperty('--restoFont', "'"+font+"'");
  // Load font from Google if not already loaded
  if(font && !document.querySelector('link[data-font="'+font+'"]')){
    const l=document.createElement('link');
    l.rel='stylesheet';
    l.dataset.font=font;
    l.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(font)+':wght@400;700&display=swap';
    document.head.appendChild(l);
  }
  // Update preview
  const box=document.getElementById('fontPreviewBox');
  if(box) box.querySelectorAll('div').forEach(el=>el.style.fontFamily="'"+font+"',serif");
  renderAll();
}

function fetchCityFromZip(zip){
  if(!zip||zip.length!==5) return;
  fetch('https://geo.api.gouv.fr/communes?codePostal='+zip+'&fields=nom&limit=1')
    .then(r=>r.json())
    .then(data=>{
      if(data&&data.length){
        if(!DATA.address) DATA.address={};
        DATA.address.city=data[0].nom;
        const cityEl=document.getElementById('cityInput');
        if(cityEl) cityEl.value=data[0].nom;
        renderAll();
      }
    })
    .catch(()=>{}); // if no internet, user types manually
}

  return `<div class="af"><div class="ai-img-wrap"><input class="ai" value="${val||''}" placeholder="${placeholder||'Image URL'}" oninput="${handler}"><label class="ai-upload-btn" title="Uploader une image"><input type="file" accept="image/*" style="display:none" onchange="uploadImgFile(this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path></svg></label></div><img class="ai-img-preview" src="${val||''}" style="${previewStyle};width:100%;max-width:120px;aspect-ratio:1;object-fit:cover;border-radius:6px;margin-top:6px;border:1px solid var(--border)" onerror="this.style.display='none'"></div>`;
}

function syncImgPreview(input){
  const wrap = input.closest('.ai-img-wrap');
  if(!wrap) return;
  const preview = wrap.parentElement.querySelector('.ai-img-preview');
  if(!preview) return;
  const v = input.value.trim();
  if(v){ preview.src = v; preview.style.display = 'block'; }
  else { preview.style.display = 'none'; }
}

// Shared guard: warns instead of silently bloating menu.json (and eventually breaking
// GitHub publish) when someone uploads a very large photo. Images end up embedded as
// base64 directly inside menu.json, so size adds up fast across dishes/galleries.
const MAX_UPLOAD_BYTES = 1.5*1024*1024; // 1.5 Mo par photo
function readImageFileSafe(file, onOk){
  if(!file) return;
  if(file.size > MAX_UPLOAD_BYTES){
    showToast('⚠️ Image trop lourde ('+Math.round(file.size/1024)+' Ko) — compressez-la sous 1,5 Mo avant import');
    return;
  }
  const r = new FileReader();
  r.onload = ev => onOk(ev.target.result);
  r.onerror = () => showToast('❌ Erreur de lecture du fichier image');
  r.readAsDataURL(file);
}
function uploadImgFile(fileInput){
  const file = fileInput.files[0];
  readImageFileSafe(file, dataUrl => {
    const wrap = fileInput.closest('.ai-img-wrap');
    const inp = wrap && wrap.querySelector('.ai');
    if(!inp) return;
    inp.value = dataUrl;
    inp.dispatchEvent(new Event('input'));
  });
}

function toggleAdminSection(el){
  const sec=el.closest('.admin-section');
  if(sec) sec.classList.toggle('collapsed');
  if(sec && !sec.classList.contains('collapsed') && sec.querySelector('#pdfPreviewFrame')){
    setTimeout(()=>{ if(typeof updatePdfPreview==='function') updatePdfPreview(); }, 100);
  }
}
function openFirstAdminSection(){
  const body=document.getElementById('adminBody');
  if(!body) return;
  const all=body.querySelectorAll('.admin-section.collapsible');
  all.forEach((s,i)=>{ if(i===0) s.classList.remove('collapsed'); else s.classList.add('collapsed'); });
}
